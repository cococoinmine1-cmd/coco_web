<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Driver - Pro Road Sync</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #121212; color: white; overflow: hidden; }
        #login-screen { position: fixed; inset: 0; background: #1a1a1a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #map { height: 45vh; width: 100%; background: #222; }
        .panel { padding: 15px; background: #1f1f1f; border-radius: 25px 25px 0 0; margin-top: -25px; position: relative; z-index: 1000; box-shadow: 0 -10px 20px rgba(0,0,0,0.5); }
        input, button { width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 8px; border: none; font-size: 13px; box-sizing: border-box; }
        input { background: #333; color: white; border: 1px solid #444; }
        .btn-main { background: #27ae60; color: white; font-weight: bold; cursor: pointer; }
        .stats { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: bold; color: #2ecc71; font-size: 11px; }
        .history-panel { background: #111; border-radius: 8px; padding: 5px; max-height: 80px; overflow-y: auto; border: 1px solid #333; margin-top: 5px; }
        #townList { font-size: 10px; color: #f1c40f; height: 30px; overflow-y: auto; border-left: 2px solid #27ae60; padding-left: 8px; margin-bottom: 5px; }
        .status-ghost { color: #f1c40f; font-size: 10px; text-align: center; display: none; font-weight: bold; padding: 5px; background: rgba(241, 196, 15, 0.1); border-radius: 5px; }
        .stop-label { background: #e74c3c; color: white; padding: 2px 5px; border-radius: 4px; font-size: 9px; border: 1px solid white; white-space: nowrap; }
        .active-draw { background: #f1c40f !important; color: black !important; }
    </style>
</head>
<body>

<div id="login-screen">
    <h1 style="color: #27ae60; margin-bottom: 10px;">Ghost Driver</h1>
    <input type="text" id="uID" placeholder="වාහන අංකය (V1, V2...)">
    <button class="btn-main" onclick="saveUser()">REGISTER & JOIN</button>
</div>

<div id="map"></div>
<div class="panel">
    <div id="ghostStatus" class="status-ghost">🚗 GHOST DRIVING... (20 KM/H SPEED)</div>
    <div class="stats">
        <span>ID: <span id="dispID" style="color:#3498db">-</span></span>
        <span>KM: <span id="km">0.00</span></span>
        <span>🕒 <span id="estTime">0m</span></span>
        <span id="currentSpeedDisplay" style="color:#e74c3c;">0 km/h</span>
    </div>
    <div id="townList">Draw Mode එක On කර රූට් එක හෝ නැවතුම් ලකුණු කරන්න...</div>
    
    <div style="display:flex; gap:5px;">
        <button id="drawToggle" onclick="toggleDrawMode()" style="background:#555; color:white; width: 40%;">DRAW MODE: OFF</button>
        <input type="text" id="routeName" placeholder="රූට් නම" style="margin-bottom:0; flex-grow:1;">
    </div>

    <div style="display:flex; gap:5px; margin-top:8px;">
        <button class="btn-main" id="startBtn" onclick="confirmRoute()">OK (START)</button>
        <button id="stopBtn" onclick="stopGhostDrive()" style="background:#c0392b; color:white; display:none;">STOP</button>
        <button onclick="clearRoute()" style="background:#e67e22; color:white; width: 20%;">CLR</button>
        <button onclick="reCenter()" style="background:#3498db; color:white; width: 20%;">LOC</button>
    </div>
    <div class="history-panel" id="historyList" style="font-size:10px; color:#ccc; padding:5px;">සම්බන්ධ වෙමින්...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "YOUR_FIREBASE_API_KEY",
        authDomain: "cococoin-mine.firebaseapp.com",
        databaseURL: "https://cococoin-mine-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "cococoin-mine",
        storageBucket: "cococoin-mine.appspot.com",
        messagingSenderId: "717018135256",
        appId: "location-38937"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let map, realMarker, ghostMarker, polyline, driveLoop;
    let driverID = localStorage.getItem('driver_letter') || "";
    let routePoints = [], totalKm = 0, isGhosting = false, isDrawing = false;
    let stopMarkers = [], totalWaitTime = 0, townNames = [];
    let otherMarkers = {}, lastRealPos = null;

    function initMap() {
        map = L.map('map', {zoomControl: false}).setView([6.9271, 79.8612], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        polyline = L.polyline([], {color: '#2ecc71', weight: 6}).addTo(map);
        map.on('click', handleMapInteraction);
    }

    window.onload = function() {
        if(driverID) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dispID').innerText = driverID;
            initMap();
            initGPS();
            listenToNetwork();
        }
    };

    function toggleDrawMode() {
        isDrawing = !isDrawing;
        const btn = document.getElementById('drawToggle');
        btn.innerText = isDrawing ? "DRAW MODE: ON" : "DRAW MODE: OFF";
        btn.classList.toggle('active-draw', isDrawing);
    }

    function handleMapInteraction(e) {
        if(!isDrawing || isGhosting) return;
        
        // පාර දිගේ රූට් එක ගන්නවා
        let start = routePoints.length > 0 ? L.latLng(routePoints[routePoints.length - 1]) : (lastRealPos || e.latlng);
        
        fetch(`https://router.project-osrm.org/route/v1/driving/${start.lng},${start.lat};${e.latlng.lng},${e.latlng.lat}?overview=full&geometries=geojson`)
        .then(res => res.json()).then(data => {
            if(data.routes && data.routes.length > 0) {
                data.routes[0].geometry.coordinates.forEach(c => {
                    routePoints.push([c[1], c[0]]);
                    polyline.addLatLng([c[1], c[0]]);
                });
                totalKm += data.routes[0].distance / 1000;
                updateStats();
                
                // ඇඳපු තැන Stop එකක් දාන්න ඕනද අහනවා
                if(confirm("මෙම ස්ථානය නැවතුමක් (Stop) ලෙස ලකුණු කරනවාද?")) {
                    let mins = prompt("නැවතුම් කාලය (මිනිත්තු):", "10");
                    if(mins) {
                        L.marker(e.latlng, {
                            icon: L.divIcon({className: 'stop-label', html: `STOP ${mins}m`})
                        }).addTo(map);
                        totalWaitTime += parseInt(mins);
                        updateStats();
                    }
                }
            }
        });
    }

    function confirmRoute() {
        if(routePoints.length < 2) return alert("කරුණාකර රූට් එකක් අඳින්න!");
        isGhosting = true;
        isDrawing = false;
        document.getElementById('drawToggle').innerText = "DRAW MODE: OFF";
        document.getElementById('drawToggle').classList.remove('active-draw');
        document.getElementById('ghostStatus').style.display = 'block';
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'inline-block';
        
        let step = 0;
        driveLoop = setInterval(() => {
            if(step < routePoints.length) {
                let pos = routePoints[Math.floor(step)];
                ghostMarker.setLatLng(pos);
                updateFirebase(pos[0], pos[1], true, "GHOST");
                document.getElementById('currentSpeedDisplay').innerText = `20 km/h`;
                map.panTo(pos);
                step += 0.4; // වේගය පාලනය (20kmh වගේ)
            } else {
                stopGhostDrive();
                alert("ගමන අවසන්!");
            }
        }, 500);
    }

    function stopGhostDrive() {
        clearInterval(driveLoop);
        isGhosting = false;
        document.getElementById('ghostStatus').style.display = 'none';
        document.getElementById('startBtn').style.display = 'inline-block';
        document.getElementById('stopBtn').style.display = 'none';
        document.getElementById('currentSpeedDisplay').innerText = `0 km/h`;
        if(lastRealPos) updateFirebase(lastRealPos.lat, lastRealPos.lng, false, "REAL");
    }

    function updateStats() {
        document.getElementById('km').innerText = totalKm.toFixed(2);
        let travelTime = (totalKm / 20) * 60; 
        document.getElementById('estTime').innerText = Math.round(travelTime + totalWaitTime) + "m";
    }

    // --- පරණ අත්‍යවශ්‍ය Function ටික (Firebase, GPS ආදිය) ---
    function initGPS() {
        map.locate({setView: false, watch: true, enableHighAccuracy: true});
        map.on('locationfound', (e) => {
            lastRealPos = e.latlng;
            if(!realMarker) {
                realMarker = L.circleMarker(e.latlng, {radius: 7, color: '#3498db'}).addTo(map);
                ghostMarker = L.marker(e.latlng).addTo(map).bindTooltip(driverID, {permanent: true});
                map.setView(e.latlng, 15);
            }
            realMarker.setLatLng(e.latlng);
        });
    }

    function updateFirebase(lat, lng, moving, mode) {
        db.ref('fleet/' + driverID).set({ lat, lng, isMoving: moving, mode: mode, lastSeen: Date.now() });
    }

    function saveUser() {
        let id = document.getElementById('uID').value.toUpperCase().trim();
        if(!id) return;
        localStorage.setItem('driver_letter', id);
        location.reload();
    }

    function listenToNetwork() {
        db.ref('shared_routes').on('value', (snap) => {
            document.getElementById('historyList').innerHTML = "රූට් සොයාගන්නා ලදී.";
        });
    }

    function clearRoute() {
        if(isGhosting) return;
        routePoints = []; polyline.setLatLngs([]); totalKm = 0; totalWaitTime = 0;
        updateStats();
        location.reload(); // සිතියමේ Stop markers අයින් කිරීමට ලේසිම ක්‍රමය
    }

    function reCenter() { if(lastRealPos) map.setView(lastRealPos, 15); }
    function logout() { localStorage.removeItem('driver_letter'); location.reload(); }
</script>
</body>
</html>
