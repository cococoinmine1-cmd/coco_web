<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Driver - Smart Sync</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #121212; color: white; overflow: hidden; }
        #login-screen { position: fixed; inset: 0; background: #1a1a1a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #map { height: 100vh; width: 100%; background: #222; z-index: 1; }
        
        /* UI Elements */
        .map-controls { position: absolute; top: 10px; left: 10px; z-index: 1000; width: calc(100% - 20px); pointer-events: none; }
        .search-box { pointer-events: auto; display: flex; gap: 5px; background: rgba(31,31,31,0.9); padding: 8px; border-radius: 12px; }
        .zoom-btns { position: absolute; top: 60px; right: 0; display: flex; flex-direction: column; gap: 5px; pointer-events: auto; }
        .zoom-btns button { width: 40px; height: 40px; border-radius: 10px; background: #1f1f1f; color: white; border: 1px solid #444; }

        .bottom-ui { position: fixed; bottom: 0; width: 100%; z-index: 1000; }
        .panel { padding: 15px; background: #1f1f1f; border-radius: 25px 25px 0 0; box-shadow: 0 -10px 20px rgba(0,0,0,0.5); }
        
        #menuContent { display: none; margin-top: 10px; }
        input, button { width: 100%; padding: 12px; margin-bottom: 8px; border-radius: 8px; border: none; font-size: 14px; box-sizing: border-box; }
        input { background: #333; color: white; border: 1px solid #444; }
        
        .btn-main { background: #27ae60; color: white; font-weight: bold; }
        .btn-record { background: #e74c3c; color: white; font-weight: bold; }
        .btn-menu { background: #34495e; color: white; font-weight: bold; }
        
        .stats { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: bold; color: #2ecc71; font-size: 12px; }
        .history-panel { background: #111; border-radius: 8px; padding: 8px; max-height: 150px; overflow-y: auto; border: 1px solid #333; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #222; font-size: 12px; }
        .status-bar { font-size: 10px; text-align: center; display: none; padding: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-screen">
    <h1 style="color: #27ae60;">Ghost Driver</h1>
    <input type="text" id="uID" placeholder="වාහන අංකය (V1, V2...)">
    <button class="btn-main" onclick="saveUser()">REGISTER & JOIN</button>
</div>

<div class="map-controls">
    <div class="search-box"><input type="text" id="searchInp" placeholder="Search Place..."><button onclick="searchPlace()" style="width:60px; background:#27ae60;">GO</button></div>
    <div class="zoom-btns"><button onclick="map.zoomIn()">+</button><button onclick="map.zoomOut()">-</button></div>
</div>

<div id="map"></div>

<div class="bottom-ui">
    <div id="statusIndicator" class="status-bar"></div>
    <div class="panel">
        <div class="stats">
            <span>ID: <span id="dispID" style="color:#3498db">-</span></span>
            <span>KM: <span id="km">0.00</span></span>
            <span id="speedDisp" style="color:#e74c3c;">0 km/h</span>
        </div>
        
        <button class="btn-menu" onclick="toggleMenu()">☰ MENU / CONTROLS</button>

        <div id="menuContent">
            <input type="text" id="routeName" placeholder="Route Name (eg: Colombo to Galle)">
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                <button class="btn-main" onclick="startGhostDrive()">START GHOST</button>
                <button class="btn-record" id="recBtn" onclick="toggleRecording()">START RECORDING</button>
                <button onclick="reCenter()" style="background:#3498db; color:white;">LOCATE ME</button>
                <button onclick="clearRoute()" style="background:#e67e22; color:white;">CLEAR MAP</button>
                <button onclick="saveRouteManual()" style="background:#f1c40f; color:black; grid-column: span 2;">SAVE CURRENT ROUTE</button>
            </div>
            
            <p style="font-size: 10px; margin: 5px 0;">SAVED ROUTES:</p>
            <div class="history-panel" id="historyList">Loading...</div>
            <button onclick="logout()" style="background:#c0392b; color:white; margin-top:10px;">LOGOUT</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "cococoin-mine.firebaseapp.com",
        databaseURL: "https://cococoin-mine-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "cococoin-mine",
        storageBucket: "cococoin-mine.appspot.com",
        messagingSenderId: "717018135256",
        appId: "location-38937"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let map, realMarker, ghostMarker, polyline;
    let driverID = localStorage.getItem('driver_letter') || "";
    let routePoints = [], totalKm = 0, isGhosting = false, isRecording = false;
    let otherMarkers = {}, lastPos = null;

    function initMap() {
        map = L.map('map', {zoomControl: false}).setView([6.9271, 79.8612], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        polyline = L.polyline([], {color: '#f1c40f', weight: 5}).addTo(map);
        map.on('click', onMapClick);
    }

    window.onload = () => {
        if(driverID) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dispID').innerText = driverID;
            initMap();
            initGPS();
            listenToNetwork();
        }
    };

    function initGPS() {
        map.locate({watch: true, enableHighAccuracy: true});
        map.on('locationfound', (e) => {
            lastPos = e.latlng;
            if(!realMarker) {
                realMarker = L.circleMarker(e.latlng, {radius: 8, color: '#3498db'}).addTo(map);
                ghostMarker = L.marker(e.latlng).addTo(map).bindTooltip(driverID, {permanent: true});
                map.setView(e.latlng, 15);
            }
            realMarker.setLatLng(e.latlng);

            if(isRecording) {
                routePoints.push([e.latlng.lat, e.latlng.lng]);
                polyline.addLatLng(e.latlng);
                calculateDistance();
            }

            if(!isGhosting) {
                ghostMarker.setLatLng(e.latlng);
                db.ref('fleet/' + driverID).update({ lat: e.latlng.lat, lng: e.latlng.lng, isMoving: isRecording });
            }
        });
    }

    function onMapClick(e) {
        if(isGhosting || isRecording) return;
        let start = routePoints.length > 0 ? L.latLng(routePoints[routePoints.length - 1]) : (lastPos || e.latlng);
        fetch(`https://router.project-osrm.org/route/v1/driving/${start.lng},${start.lat};${e.latlng.lng},${e.latlng.lat}?overview=full&geometries=geojson`)
        .then(res => res.json()).then(data => {
            if(data.routes) {
                data.routes[0].geometry.coordinates.forEach(c => {
                    routePoints.push([c[1], c[0]]);
                    polyline.addLatLng([c[1], c[0]]);
                });
                calculateDistance();
            }
        });
    }

    function toggleRecording() {
        if(!isRecording) {
            isRecording = true;
            routePoints = []; polyline.setLatLngs([]); 
            document.getElementById('recBtn').innerText = "STOP & SAVE";
            showStatus("🔴 RECORDING LIVE TRIP...", "#e74c3c");
        } else {
            isRecording = false;
            document.getElementById('recBtn').innerText = "START RECORDING";
            saveRouteManual();
            showStatus("");
        }
    }

    function startGhostDrive() {
        if(routePoints.length < 2) return alert("පළමුව රූට් එකක් අඳින්න!");
        isGhosting = true;
        toggleMenu();
        showStatus("👻 GHOST DRIVING ACTIVE", "#f1c40f");
        let i = 0;
        let driveInterval = setInterval(() => {
            if(i < routePoints.length) {
                let p = routePoints[Math.floor(i)];
                ghostMarker.setLatLng(p);
                db.ref('fleet/' + driverID).update({ lat: p[0], lng: p[1], isMoving: true });
                map.panTo(p);
                i += 0.5;
            } else {
                clearInterval(driveInterval);
                isGhosting = false;
                showStatus("");
                alert("Ghost Drive අවසන්!");
            }
        }, 500);
    }

    function saveRouteManual() {
        if(routePoints.length < 2) return alert("Save කිරීමට රූට් එකක් නැත!");
        let name = document.getElementById('routeName').value || "New Route";
        db.ref('shared_routes/' + Date.now()).set({
            driver: driverID, name: name, km: totalKm.toFixed(2), points: routePoints
        });
        alert("රූට් එක සේව් වුණා!");
    }

    function calculateDistance() {
        totalKm = 0;
        for(let i=1; i<routePoints.length; i++) {
            totalKm += L.latLng(routePoints[i-1]).distanceTo(L.latLng(routePoints[i])) / 1000;
        }
        document.getElementById('km').innerText = totalKm.toFixed(2);
    }

    function listenToNetwork() {
        db.ref('fleet').on('value', snap => {
            let data = snap.val();
            for(let id in data) {
                if(id !== driverID) {
                    if(!otherMarkers[id]) otherMarkers[id] = L.marker([data[id].lat, data[id].lng]).addTo(map).bindTooltip(id);
                    else otherMarkers[id].setLatLng([data[id].lat, data[id].lng]);
                }
            }
        });
        db.ref('shared_routes').on('value', snap => {
            let list = document.getElementById('historyList');
            list.innerHTML = "";
            let data = snap.val();
            for(let key in data) {
                let r = data[key];
                let div = document.createElement('div');
                div.className = "history-item";
                div.innerHTML = `<span><b>${r.name}</b> (${r.km}km)</span><button onclick="loadRoute('${key}')" style="width:auto; padding:5px; background:#27ae60; color:white;">LOAD</button>`;
                list.appendChild(div);
            }
        });
    }

    window.loadRoute = (id) => {
        db.ref('shared_routes/' + id).once('value', snap => {
            let r = snap.val();
            routePoints = r.points;
            polyline.setLatLngs(routePoints);
            calculateDistance();
            map.fitBounds(polyline.getBounds());
            toggleMenu();
        });
    }

    function toggleMenu() {
        let m = document.getElementById('menuContent');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    function showStatus(txt, col) {
        let s = document.getElementById('statusIndicator');
        if(!txt) { s.style.display = 'none'; return; }
        s.innerText = txt; s.style.background = col; s.style.display = 'block';
    }

    function clearRoute() { routePoints = []; polyline.setLatLngs([]); document.getElementById('km').innerText = "0.00"; }
    function searchPlace() {
        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${document.getElementById('searchInp').value}`)
        .then(r => r.json()).then(d => { if(d[0]) map.setView([d[0].lat, d[0].lon], 15); });
    }
    function saveUser() { localStorage.setItem('driver_letter', document.getElementById('uID').value.toUpperCase()); location.reload(); }
    function logout() { localStorage.clear(); location.reload(); }
    function reCenter() { if(lastPos) map.setView(lastPos, 15); }
</script>
</body>
</html>
