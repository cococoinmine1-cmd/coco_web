<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Driver GPS Pro - ESP32 Sync</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        .panel { position: fixed; bottom: 0; width: 100%; background: #1a1a1a; z-index: 1000; border-radius: 20px 20px 0 0; padding: 15px; box-sizing: border-box; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; display: none; }
        button { padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        input { padding: 10px; background: #333; color: #fff; border: 1px solid #444; border-radius: 5px; width: 100%; box-sizing: border-box; }
        .btn-green { background: #27ae60; color: white; }
        .btn-red { background: #c0392b; color: white; }
        .btn-blue { background: #2980b9; color: white; }
        .btn-orange { background: #f39c12; color: white; }
        .btn-bt { background: #0082FC; color: white; margin-bottom: 10px; }
        .stats { display: flex; justify-content: space-between; font-size: 12px; color: #2ecc71; margin-bottom: 10px; }
        #status { position: absolute; top: -40px; left: 50%; transform: translateX(-50%); background: #f1c40f; color: #000; padding: 5px 15px; border-radius: 10px; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="panel">
    <div id="status">STANDBY</div>
    <div class="stats">
        <span>UNIT: <b id="dispID">-</b></span>
        <span>DIST: <b id="km">0.00</b> KM</span>
        <span>STOP TIME: <b id="totalTime">0</b> MIN</span>
    </div>

    <button class="btn-bt" style="width:100%" onclick="connectESP32()">🔗 CONNECT ESP32 (BLUETOOTH)</button>
    <button class="btn-blue" style="width:100%" onclick="toggleMenu()">☰ CONTROL PANEL</button>

    <div id="menuContent" class="menu-grid">
        <input type="text" id="routeName" placeholder="Route Name">
        <input type="number" id="stopTime" placeholder="Stop Minutes" value="5">
        
        <button class="btn-orange" onclick="addStop()">📍 ADD STOP HERE</button>
        <button class="btn-green" onclick="startGhost()">🚀 START GHOST</button>
        <button class="btn-blue" onclick="saveFullRoute()">💾 SAVE ROUTE</button>
        <button class="btn-red" onclick="clearMap()">🧹 CLEAR MAP</button>
        
        <div id="routeList" class="history-box" style="grid-column: span 2; max-height: 100px; overflow-y: auto;"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Firebase configs are skipped to focus on ESP32 sync
    let map, marker, polyline;
    let bluetoothCharacteristic;
    let driverID = localStorage.getItem('unitID') || prompt("Enter Unit ID:");
    localStorage.setItem('unitID', driverID);
    document.getElementById('dispID').innerText = driverID;

    let routeData = []; 
    let isGhosting = false;
    let totalWaitTime = 0;

    function initMap() {
        map = L.map('map', {zoomControl: false}).setView([6.9271, 79.8612], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        polyline = L.polyline([], {color: '#2ecc71', weight: 6}).addTo(map);
        marker = L.marker([0,0]).addTo(map).bindTooltip(driverID, {permanent: true});

        map.on('click', (e) => {
            if(isGhosting) return;
            let lastPoint = routeData.length > 0 ? routeData[routeData.length-1] : null;
            let start = lastPoint ? `${lastPoint.lng},${lastPoint.lat}` : `${e.latlng.lng},${e.latlng.lat}`;
            
            fetch(`https://router.project-osrm.org/route/v1/driving/${start};${e.latlng.lng},${e.latlng.lat}?overview=full&geometries=geojson`)
            .then(r => r.json()).then(data => {
                let coords = data.routes[0].geometry.coordinates;
                coords.forEach(c => {
                    routeData.push({lat: c[1], lng: c[0], stop: 0});
                    polyline.addLatLng([c[1], c[0]]);
                });
                updateStats(data.routes[0].distance / 1000);
            });
        });
    }

    // Bluetooth සම්බන්ධ කිරීම (ESP32 සමඟ)
    async function connectESP32() {
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'GPS_GHOST_PRO' }],
                optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
            bluetoothCharacteristic = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
            alert("ESP32 Connected Successfully!");
        } catch (e) {
            alert("Bluetooth Error: " + e.message);
        }
    }

    function addStop() {
        if(routeData.length === 0) return alert("අඳින ලද රූට් එකක් නැත!");
        let mins = parseInt(document.getElementById('stopTime').value) || 5;
        routeData[routeData.length - 1].stop = mins;
        totalWaitTime += mins;
        document.getElementById('totalTime').innerText = totalWaitTime;
        
        // සිතියමේ Stop එක පෙන්වන්න රතු ලකුණක් දාමු
        L.circleMarker([routeData[routeData.length-1].lat, routeData[routeData.length-1].lng], {radius: 8, color: 'red'}).addTo(map);
        alert(`නැවතුම විනාඩි ${mins} ක් ලෙස සටහන් විය.`);
    }

    async function startGhost() {
        if(routeData.length < 2) return;
        isGhosting = true;
        toggleMenu();
        const statusEl = document.getElementById('status');
        statusEl.style.display = "block";

        for(let i=0; i<routeData.length; i++) {
            let p = routeData[i];
            marker.setLatLng([p.lat, p.lng]);
            map.panTo([p.lat, p.lng]);

            // ESP32 එකට Bluetooth හරහා දත්ත යවනවා (Lat,Lng format එකෙන්)
            if (bluetoothCharacteristic) {
                let encoder = new TextEncoder();
                let dataString = `${p.lat.toFixed(6)},${p.lng.toFixed(6)}\n`;
                await bluetoothCharacteristic.writeValue(encoder.encode(dataString));
            }

            if(p.stop > 0) {
                statusEl.innerText = `STOPPED FOR ${p.stop} MIN`;
                statusEl.style.background = "#e67e22";
                // නතර වී සිටින කාලය (මෙහි 2000 යනු පරීක්ෂාවට තත්පර 2ක් පමණි)
                await new Promise(r => setTimeout(r, p.stop * 2000)); 
            } else {
                statusEl.innerText = "DRIVING ON ROAD...";
                statusEl.style.background = "#f1c40f";
                await new Promise(r => setTimeout(r, 600)); // පාරේ යන වේගය
            }
        }
        isGhosting = false;
        statusEl.style.display = "none";
        alert("රූට් එක අවසන්!");
    }

    function updateStats(km) {
        let cur = parseFloat(document.getElementById('km').innerText);
        document.getElementById('km').innerText = (cur + km).toFixed(2);
    }

    function toggleMenu() {
        let m = document.getElementById('menuContent');
        m.style.display = m.style.display === 'grid' ? 'none' : 'grid';
    }

    function clearMap() {
        routeData = [];
        polyline.setLatLngs([]);
        document.getElementById('km').innerText = "0.00";
        totalWaitTime = 0;
        document.getElementById('totalTime').innerText = "0";
        map.eachLayer(l => { if(l instanceof L.CircleMarker) map.removeLayer(l); });
    }

    initMap();
</script>
</body>
</html>
