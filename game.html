<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Driver Pro - Dark Edition</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; overflow: hidden; }
        #map { height: 100vh; width: 100%; background: #111; } /* Loading background */
        .panel { position: fixed; bottom: 0; width: 100%; background: #1a1a1a; z-index: 1000; border-radius: 20px 20px 0 0; padding: 15px; box-sizing: border-box; border-top: 2px solid #2ecc71; box-shadow: 0 -5px 15px rgba(0,0,0,0.5); }
        .stats { display: flex; justify-content: space-between; font-size: 11px; color: #2ecc71; margin-bottom: 10px; background: #000; padding: 10px; border-radius: 8px; border: 1px solid #333; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        button:active { transform: scale(0.95); }
        input { padding: 12px; background: #222; color: #fff; border: 1px solid #333; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 8px; }
        .btn-start { background: #27ae60; color: white; grid-column: span 2; font-size: 16px; margin-bottom: 5px; }
        .btn-stop { background: #e67e22; color: white; }
        .btn-clear { background: #c0392b; color: white; }
        .btn-save { background: #2980b9; color: white; }
        .status-float { position: absolute; top: -45px; left: 50%; transform: translateX(-50%); background: #f1c40f; color: #000; padding: 6px 25px; border-radius: 20px; font-weight: bold; display: none; z-index: 1001; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div id="status" class="status-float">OFFLINE</div>
<div id="map"></div>

<div class="panel">
    <div class="stats">
        <span>UNIT: <b id="dispID">-</b></span>
        <span>DIST: <b id="km">0.00</b> KM</span>
        <span>STOPS: <b id="totalStops">0</b> MIN</span>
    </div>

    <div style="display: flex; gap: 5px; margin-bottom: 8px;">
        <input type="number" id="stopTime" placeholder="නැවතී සිටින කාලය (Min)" style="margin-bottom: 0;">
        <button class="btn-stop" onclick="addStop()" style="width: 120px;">ADD STOP</button>
    </div>

    <input type="text" id="routeName" placeholder="Route Name (eg: Colombo - Kandy)">

    <div class="btn-grid">
        <button class="btn-start" id="driveBtn" onclick="startGhost()">🚀 START GHOST DRIVE</button>
        <button class="btn-save" onclick="saveRoute()">💾 SAVE ROUTE</button>
        <button class="btn-clear" onclick="clearAll()">🧹 CLEAR MAP</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // Firebase Config (Replace with yours)
    const firebaseConfig = { apiKey: "YOUR_KEY", databaseURL: "YOUR_URL" };
    if (firebaseConfig.apiKey !== "YOUR_KEY") firebase.initializeApp(firebaseConfig);

    let map, marker, polyline;
    let routeData = []; 
    let isGhosting = false;
    let totalWait = 0;

    let driverID = localStorage.getItem('unitID') || prompt("Enter Unit ID (V1-V10):") || "V-TEST";
    localStorage.setItem('unitID', driverID);
    document.getElementById('dispID').innerText = driverID;

    function initMap() {
        // මැප් එක හරියටම පේන්න මෙතන Dark Mode Tiles පාවිච්චි කරනවා
        map = L.map('map', {zoomControl: false}).setView([6.9271, 79.8612], 13);
        
        // Dark Mode Map Tiles (රෑට පට්ටට පේනවා)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '©OpenStreetMap'
        }).addTo(map);
        
        polyline = L.polyline([], {color: '#2ecc71', weight: 6, opacity: 0.9}).addTo(map);
        marker = L.marker([0,0]).addTo(map).bindTooltip(driverID, {permanent: true, direction: 'top'});

        map.on('click', (e) => {
            if(isGhosting) return;
            let lastPoint = routeData.length > 0 ? routeData[routeData.length-1] : null;
            let start = lastPoint ? `${lastPoint.lng},${lastPoint.lat}` : `${e.latlng.lng},${e.latlng.lat}`;
            
            fetch(`https://router.project-osrm.org/route/v1/driving/${start};${e.latlng.lng},${e.latlng.lat}?overview=full&geometries=geojson`)
            .then(r => r.json()).then(data => {
                if(data.routes && data.routes[0]) {
                    data.routes[0].geometry.coordinates.forEach(c => {
                        routeData.push({lat: c[1], lng: c[0], stop: 0});
                        polyline.addLatLng([c[1], c[0]]);
                    });
                    let dist = parseFloat(document.getElementById('km').innerText) + (data.routes[0].distance / 1000);
                    document.getElementById('km').innerText = dist.toFixed(2);
                    map.panTo([e.latlng.lat, e.latlng.lng]);
                }
            }).catch(e => console.log("Map Error: Check Internet"));
        });
    }

    function addStop() {
        if(routeData.length === 0) return alert("මුලින් මැප් එකේ රූට් එකක් අඳින්න");
        let mins = parseInt(document.getElementById('stopTime').value) || 0;
        routeData[routeData.length-1].stop = mins;
        totalWait += mins;
        document.getElementById('totalStops').innerText = totalWait;
        
        L.circleMarker([routeData[routeData.length-1].lat, routeData[routeData.length-1].lng], 
            {radius: 7, color: '#f39c12', fillOpacity: 1}).addTo(map).bindPopup("STOP: "+mins+" min").openPopup();
        document.getElementById('stopTime').value = "";
    }

    async function startGhost() {
        if(routeData.length < 2) return alert("රූට් එකක් නැත!");
        isGhosting = true;
        const statusDiv = document.getElementById('status');
        statusDiv.style.display = "block";
        document.getElementById('driveBtn').disabled = true;

        for(let i=0; i<routeData.length; i++) {
            if(!isGhosting) break;
            let p = routeData[i];
            marker.setLatLng([p.lat, p.lng]);
            map.panTo([p.lat, p.lng]);

            // ESP32 හෝ Firebase වෙත දත්ත යැවීමට මෙතන පාවිච්චි කරන්න
            if(firebase.apps.length) {
                firebase.database().ref('fleet/' + driverID).set({lat: p.lat, lng: p.lng, ts: Date.now()});
            }

            if(p.stop > 0) {
                statusDiv.innerText = `🛑 STOPPED: ${p.stop} MIN`;
                statusDiv.style.background = "#e67e22";
                await new Promise(r => setTimeout(r, p.stop * 2000)); // Testing speed
            } else {
                statusDiv.innerText = "🚚 DRIVING...";
                statusDiv.style.background = "#27ae60";
                await new Promise(r => setTimeout(r, 600)); 
            }
        }
        isGhosting = false;
        statusDiv.style.display = "none";
        document.getElementById('driveBtn').disabled = false;
        alert("ගමන අවසන්!");
    }

    function clearAll() {
        location.reload();
    }

    function saveRoute() {
        alert("Route Saved Locally!");
    }

    // මිනුත් මැප් එක ලෝඩ් කරන නිවැරදි විදිහ
    window.onload = initMap;
</script>
</body>
</html>
