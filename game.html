<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Driver GPS Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        .panel { position: fixed; bottom: 0; width: 100%; background: #1a1a1a; z-index: 1000; border-radius: 20px 20px 0 0; padding: 15px; box-sizing: border-box; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; display: none; }
        button { padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        input { padding: 10px; background: #333; color: #fff; border: 1px solid #444; border-radius: 5px; width: 100%; box-sizing: border-box; }
        .btn-green { background: #27ae60; color: white; }
        .btn-red { background: #c0392b; color: white; }
        .btn-blue { background: #2980b9; color: white; }
        .btn-orange { background: #f39c12; color: white; }
        .stats { display: flex; justify-content: space-between; font-size: 12px; color: #2ecc71; margin-bottom: 10px; }
        .status-tag { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); background: #f1c40f; color: #000; padding: 2px 15px; border-radius: 10px; font-weight: bold; font-size: 12px; display: none; }
        .history-box { max-height: 150px; overflow-y: auto; background: #111; margin-top: 10px; padding: 5px; border-radius: 5px; }
        .route-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #222; font-size: 12px; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="panel">
    <div id="status" class="status-tag">DRIVING...</div>
    <div class="stats">
        <span>UNIT: <b id="dispID">-</b></span>
        <span>DIST: <b id="km">0.00</b> KM</span>
        <span>TIME: <b id="totalTime">0</b> MIN</span>
    </div>

    <button class="btn-blue" style="width:100%" onclick="toggleMenu()">☰ CONTROL PANEL</button>

    <div id="menuContent" class="menu-grid">
        <input type="text" id="routeName" placeholder="Route Name">
        <input type="number" id="stopTime" placeholder="Stop Minutes at this point">
        
        <button class="btn-green" onclick="startGhost()">🚀 START GHOST</button>
        <button class="btn-orange" onclick="addStop()">📍 ADD STOP HERE</button>
        <button class="btn-red" onclick="clearMap()">🧹 CLEAR MAP</button>
        <button class="btn-blue" onclick="saveFullRoute()">💾 SAVE ROUTE</button>
        
        <div class="history-box" id="routeList" style="grid-column: span 2;">Loading Routes...</div>
        <button class="btn-red" onclick="localStorage.clear(); location.reload();" style="grid-column: span 2;">LOGOUT</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = { apiKey: "YOUR_KEY", databaseURL: "YOUR_URL" }; 
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let map, marker, polyline;
    let driverID = localStorage.getItem('unitID') || prompt("Enter Unit ID (V1-V10):");
    if(driverID) localStorage.setItem('unitID', driverID);
    document.getElementById('dispID').innerText = driverID;

    let routeData = []; // {lat, lng, stop: 0}
    let isGhosting = false;
    let totalMinutes = 0;

    function initMap() {
        map = L.map('map', {zoomControl: false}).setView([6.9271, 79.8612], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        polyline = L.polyline([], {color: '#2ecc71', weight: 5}).addTo(map);
        marker = L.marker([0,0]).addTo(map).bindTooltip(driverID, {permanent: true});

        map.on('click', (e) => {
            if(isGhosting) return;
            let lastPoint = routeData.length > 0 ? routeData[routeData.length-1] : null;
            let start = lastPoint ? `${lastPoint.lng},${lastPoint.lat}` : `${e.latlng.lng},${e.latlng.lat}`;
            
            // Snap to Road API
            fetch(`https://router.project-osrm.org/route/v1/driving/${start};${e.latlng.lng},${e.latlng.lat}?overview=full&geometries=geojson`)
            .then(r => r.json()).then(data => {
                let coords = data.routes[0].geometry.coordinates;
                coords.forEach(c => {
                    routeData.push({lat: c[1], lng: c[0], stop: 0});
                    polyline.addLatLng([c[1], c[0]]);
                });
                updateStats(data.routes[0].distance / 1000);
            });
        });
    }

    function addStop() {
        if(routeData.length === 0) return alert("පළමුව රූට් එකක් අඳින්න");
        let mins = parseInt(document.getElementById('stopTime').value) || 5;
        routeData[routeData.length - 1].stop = mins;
        totalMinutes += mins;
        document.getElementById('totalTime').innerText = totalMinutes;
        alert(`නැවතුම විනාඩි ${mins} ක් ලෙස සටහන් විය.`);
    }

    async function startGhost() {
        if(routeData.length < 2) return;
        isGhosting = true;
        toggleMenu();
        document.getElementById('status').style.display = "block";

        for(let i=0; i<routeData.length; i++) {
            let p = routeData[i];
            marker.setLatLng([p.lat, p.lng]);
            map.panTo([p.lat, p.lng]);
            
            // Firebase එකට Data යැවීම (නතර කර ඇති විට පවා එකම අගය යයි - No drift)
            await db.ref('fleet/' + driverID).set({ lat: p.lat, lng: p.lng, ts: Date.now() });

            if(p.stop > 0) {
                document.getElementById('status').innerText = `STOPPED FOR ${p.stop} MIN`;
                await new Promise(r => setTimeout(r, p.stop * 2000)); // විනාඩියකට තත්පර 2ක් වැනි වේගයකින් පෙන්වයි
            } else {
                document.getElementById('status').innerText = "DRIVING...";
                await new Promise(r => setTimeout(r, 600)); // පාරේ යන වේගය
            }
        }
        isGhosting = false;
        document.getElementById('status').style.display = "none";
        alert("ගමන අවසන්!");
    }

    function saveFullRoute() {
        let name = document.getElementById('routeName').value || "New Route";
        db.ref('saved_routes/' + Date.now()).set({
            name: name,
            points: routeData,
            dist: document.getElementById('km').innerText,
            time: totalMinutes,
            driver: driverID
        });
    }

    function updateStats(addKm) {
        let current = parseFloat(document.getElementById('km').innerText);
        document.getElementById('km').innerText = (current + addKm).toFixed(2);
    }

    function toggleMenu() {
        let m = document.getElementById('menuContent');
        m.style.display = m.style.display === 'grid' ? 'none' : 'grid';
    }

    function clearMap() {
        routeData = [];
        polyline.setLatLngs([]);
        document.getElementById('km').innerText = "0.00";
        totalMinutes = 0;
        document.getElementById('totalTime').innerText = "0";
    }

    // සේව් කරපු රූට් ලෝඩ් කිරීම
    db.ref('saved_routes').on('value', snap => {
        let html = "";
        snap.forEach(child => {
            let r = child.val();
            html += `<div class="route-item">
                <span><b>${r.name}</b> (${r.dist}km)</span>
                <button onclick="loadRoute('${child.key}')" class="btn-green" style="padding:2px 10px">LOAD</button>
            </div>`;
        });
        document.getElementById('routeList').innerHTML = html;
    });

    window.loadRoute = (id) => {
        db.ref('saved_routes/' + id).once('value', snap => {
            let r = snap.val();
            clearMap();
            routeData = r.points;
            r.points.forEach(p => polyline.addLatLng([p.lat, p.lng]));
            document.getElementById('km').innerText = r.dist;
            totalMinutes = r.time;
            document.getElementById('totalTime').innerText = r.time;
            toggleMenu();
        });
    }

    initMap();
</script>

</body>
</html>
