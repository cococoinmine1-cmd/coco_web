<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Driver - Ultra Sync</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #121212; color: white; overflow: hidden; }
        #login-screen { position: fixed; inset: 0; background: #1a1a1a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #map { height: 100vh; width: 100%; background: #222; position: absolute; top: 0; }
        
        /* Floating Controls on Map */
        .map-overlay { position: absolute; z-index: 1000; pointer-events: none; width: 100%; height: 100%; }
        .controls-top { position: absolute; top: 15px; left: 15px; pointer-events: auto; display: flex; flex-direction: column; gap: 8px; }
        .controls-right { position: absolute; top: 15px; right: 15px; pointer-events: auto; display: flex; flex-direction: column; gap: 10px; }
        .controls-bottom { position: absolute; bottom: 230px; left: 15px; right: 15px; pointer-events: auto; display: flex; gap: 8px; }
        
        .m-btn { background: #1f1f1f; color: white; border: 1px solid #444; border-radius: 8px; padding: 10px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); pointer-events: auto; }
        .btn-green { background: #27ae60 !important; border: none; }
        .btn-red { background: #c0392b !important; border: none; }
        .btn-blue { background: #3498db !important; border: none; }
        .btn-orange { background: #e67e22 !important; border: none; }
        
        .draw-active { background: #f1c40f !important; color: black; }

        /* Bottom History Panel */
        .panel { position: absolute; bottom: 0; width: 100%; height: 210px; background: #1a1a1a; border-radius: 20px 20px 0 0; z-index: 1001; padding: 15px; box-sizing: border-box; box-shadow: 0 -5px 20px rgba(0,0,0,0.6); }
        .history-list { height: 100px; overflow-y: auto; background: #111; border-radius: 10px; padding: 5px; margin-top: 5px; border: 1px solid #333; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #222; font-size: 11px; }
        
        .stats-bar { display: flex; justify-content: space-between; font-size: 12px; font-weight: bold; color: #2ecc71; margin-bottom: 10px; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 5px; }
        input { background: #333; color: white; border: 1px solid #444; padding: 8px; border-radius: 5px; width: 60%; }
        
        .zoom-btn { width: 45px; height: 45px; font-size: 20px; display: flex; align-items: center; justify-content: center; border-radius: 50% !important; }
    </style>
</head>
<body>

<div id="login-screen">
    <h1 style="color: #27ae60;">Ghost Driver</h1>
    <input type="text" id="uID" placeholder="Vehicle ID (e.g. V1)" style="width: 250px; margin-bottom: 10px;">
    <button class="m-btn btn-green" onclick="saveUser()" style="width: 250px;">REGISTER</button>
</div>

<div id="map"></div>

<div class="map-overlay">
    <div class="controls-top">
        <button id="drawBtn" class="m-btn" onclick="toggleDrawMode()">✏️ DRAW MODE: OFF</button>
        <button class="m-btn btn-red" onclick="logout()">LOGOUT</button>
    </div>

    <div class="controls-right">
        <button class="m-btn zoom-btn btn-blue" onclick="reCenter()">📍</button>
        <button class="m-btn zoom-btn" onclick="map.zoomIn()">+</button>
        <button class="m-btn zoom-btn" onclick="map.zoomOut()">-</button>
    </div>

    <div class="controls-bottom">
        <input type="text" id="routeName" placeholder="Route Name...">
        <button id="startBtn" class="m-btn btn-green" onclick="confirmRoute()" style="flex-grow: 1;">OK (START)</button>
        <button id="stopBtn" class="m-btn btn-red" onclick="stopGhostDrive()" style="display:none; flex-grow: 1;">STOP DRIVE</button>
        <button class="m-btn btn-orange" onclick="clearRoute()">CLR</button>
    </div>
</div>

<div class="panel">
    <div class="stats-bar">
        <span>ID: <span id="dispID" style="color:#3498db">-</span></span>
        <span>KM: <span id="km">0.00</span> | 🕒 <span id="estTime">0m</span></span>
        <span id="speedDisp" style="color:#e74c3c;">0 km/h</span>
    </div>
    <div style="font-size: 11px; color: #888; margin-bottom: 5px;">SAVED ROUTES (HISTORY)</div>
    <div class="history-list" id="historyList">Loading...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        databaseURL: "https://your-db.firebaseio.com",
        projectId: "your-id"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let map, realMarker, ghostMarker, polyline, driveLoop;
    let driverID = localStorage.getItem('driver_letter') || "";
    let routePoints = [], totalKm = 0, isGhosting = false, isDrawing = false;
    let lastRealPos = null;

    function initMap() {
        map = L.map('map', {zoomControl: false}).setView([6.9271, 79.8612], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        polyline = L.polyline([], {color: '#2ecc71', weight: 6}).addTo(map);
        map.on('click', handleMapInteraction);
    }

    window.onload = function() {
        if(driverID) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dispID').innerText = driverID;
            initMap();
            initGPS();
            loadHistory();
        }
    };

    function toggleDrawMode() {
        isDrawing = !isDrawing;
        const btn = document.getElementById('drawBtn');
        btn.innerText = isDrawing ? "✏️ DRAW MODE: ON" : "✏️ DRAW MODE: OFF";
        btn.classList.toggle('draw-active', isDrawing);
    }

    function handleMapInteraction(e) {
        if(!isDrawing || isGhosting) return;
        let start = routePoints.length > 0 ? L.latLng(routePoints[routePoints.length - 1]) : (lastRealPos || e.latlng);
        
        fetch(`https://router.project-osrm.org/route/v1/driving/${start.lng},${start.lat};${e.latlng.lng},${e.latlng.lat}?overview=full&geometries=geojson`)
        .then(res => res.json()).then(data => {
            if(data.routes && data.routes.length > 0) {
                data.routes[0].geometry.coordinates.forEach(c => {
                    routePoints.push([c[1], c[0]]);
                    polyline.addLatLng([c[1], c[0]]);
                });
                totalKm += data.routes[0].distance / 1000;
                updateStats();
                // Check for stop
                if(confirm("මෙතන STOP එකක් ලකුණු කරනවාද?")) {
                    L.marker(e.latlng, {icon: L.divIcon({className: 'stop-label', html: `<div style="background:red; color:white; padding:2px; font-size:9px; border-radius:3px;">STOP</div>`})}).addTo(map);
                }
            }
        });
    }

    function confirmRoute() {
        if(routePoints.length < 2) return alert("කරුණාකර පාරක් අඳින්න!");
        let rName = document.getElementById('routeName').value || "New Route";
        let rId = Date.now().toString();
        db.ref('shared_routes/' + rId).set({ id: rId, name: rName, points: routePoints, km: totalKm.toFixed(2), driver: driverID });
        startGhostDrive(routePoints);
    }

    function startGhostDrive(points) {
        isGhosting = true; isDrawing = false;
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'block';
        
        let step = 0;
        driveLoop = setInterval(() => {
            if(step < points.length) {
                let pos = points[Math.floor(step)];
                ghostMarker.setLatLng(pos);
                db.ref('fleet/' + driverID).set({ lat: pos[0], lng: pos[1], status: "MOVING" });
                document.getElementById('speedDisp').innerText = `18 km/h`;
                map.panTo(pos);
                step += 0.3; // Speed 15-20kmh
            } else { stopGhostDrive(); }
        }, 500);
    }

    function stopGhostDrive() {
        clearInterval(driveLoop);
        isGhosting = false;
        document.getElementById('startBtn').style.display = 'block';
        document.getElementById('stopBtn').style.display = 'none';
        db.ref('fleet/' + driverID).update({ status: "STOPPED" });
        document.getElementById('speedDisp').innerText = `0 km/h`;
    }

    function loadHistory() {
        db.ref('shared_routes').on('value', (snap) => {
            const list = document.getElementById('historyList'); list.innerHTML = "";
            const data = snap.val(); if(!data) return;
            Object.keys(data).forEach(id => {
                let r = data[id];
                let div = document.createElement('div');
                div.className = "history-item";
                div.innerHTML = `<span><b>${r.name}</b> (${r.km}km)</span>
                                <div>
                                    <button class="m-btn btn-green" style="padding:4px 8px; font-size:10px;" onclick='startSavedRoute(${JSON.stringify(r.points)})'>START</button>
                                    <button class="m-btn btn-red" style="padding:4px 8px; font-size:10px;" onclick="deleteRoute('${r.id}')">DEL</button>
                                </div>`;
                list.appendChild(div);
            });
        });
    }

    window.startSavedRoute = function(pts) {
        routePoints = pts;
        polyline.setLatLngs(pts);
        startGhostDrive(pts);
    }

    function initGPS() {
        map.locate({setView: true, watch: true, enableHighAccuracy: true});
        map.on('locationfound', (e) => {
            lastRealPos = e.latlng;
            if(!realMarker) {
                realMarker = L.circleMarker(e.latlng, {radius: 6, color: '#3498db'}).addTo(map);
                ghostMarker = L.marker(e.latlng).addTo(map).bindTooltip(driverID, {permanent: true});
            }
            realMarker.setLatLng(e.latlng);
        });
    }

    function deleteRoute(id) { if(confirm("මකන්නද?")) db.ref('shared_routes/' + id).remove(); }
    function updateStats() { document.getElementById('km').innerText = totalKm.toFixed(2); document.getElementById('estTime').innerText = Math.round((totalKm/18)*60) + "m"; }
    function saveUser() { let id = document.getElementById('uID').value.toUpperCase().trim(); if(id) { localStorage.setItem('driver_letter', id); location.reload(); } }
    function logout() { localStorage.removeItem('driver_letter'); location.reload(); }
    function reCenter() { if(lastRealPos) map.setView(lastRealPos, 16); }
    function clearRoute() { location.reload(); }
</script>
</body>
</html>
