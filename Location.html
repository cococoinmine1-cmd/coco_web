<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Driver - Pro Road Sync</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #121212; color: white; overflow: hidden; }
        #login-screen { position: fixed; inset: 0; background: #1a1a1a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #map { height: 45vh; width: 100%; background: #222; }
        .panel { padding: 15px; background: #1f1f1f; border-radius: 25px 25px 0 0; margin-top: -25px; position: relative; z-index: 1000; box-shadow: 0 -10px 20px rgba(0,0,0,0.5); }
        input, button { width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 8px; border: none; font-size: 13px; box-sizing: border-box; }
        input { background: #333; color: white; border: 1px solid #444; }
        .btn-main { background: #27ae60; color: white; font-weight: bold; cursor: pointer; }
        .stats { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: bold; color: #2ecc71; font-size: 11px; }
        .history-panel { background: #111; border-radius: 8px; padding: 5px; max-height: 80px; overflow-y: auto; border: 1px solid #333; margin-top: 5px; }
        .history-item { padding: 6px; border-bottom: 1px solid #222; cursor: pointer; display: flex; justify-content: space-between; background: #1a1a1a; margin-bottom: 3px; border-radius: 4px; }
        .history-item:hover { background: #2c3e50; }
        #townList { font-size: 10px; color: #f1c40f; height: 30px; overflow-y: auto; border-left: 2px solid #27ae60; padding-left: 8px; margin-bottom: 5px; }
        .status-ghost { color: #f1c40f; font-size: 10px; text-align: center; display: none; font-weight: bold; padding: 5px; background: rgba(241, 196, 15, 0.1); border-radius: 5px; }
        .stop-label { background: #e74c3c; color: white; padding: 2px 5px; border-radius: 4px; font-size: 9px; border: 1px solid white; white-space: nowrap; }
        .active-draw { background: #f1c40f !important; color: black !important; }
    </style>
</head>
<body> 

<div id="login-screen">
    <h1 style="color: #27ae60; margin-bottom: 10px;">Ghost Driver</h1>
    <input type="text" id="uID" placeholder="වාහන අංකය (V1, V2, 56-3894...)">
    <button class="btn-main" onclick="saveUser()">REGISTER & JOIN</button>
</div> 

<div id="map"></div>
<div class="panel">
    <div id="ghostStatus" class="status-ghost">🚗 GHOST DRIVING... (MOUNTAIN MODE ACTIVE)</div>
    <div class="stats">
        <span>ID: <span id="dispID" style="color:#3498db">-</span></span>
        <span>KM: <span id="km">0.00</span></span>
        <span>🕒 <span id="estTime">0m</span></span>
        <span id="currentSpeedDisplay" style="color:#e74c3c;">0 km/h</span>
    </div>
    <div id="townList">Real Location මාදිලිය සක්‍රීයයි. පාරක් ඇඳීමට DRAW MODE ඔන් කරන්න...</div>
    
    <div style="display:flex; gap:5px;">
        <button id="drawToggle" onclick="toggleDrawMode()" style="background:#555; color:white; width: 40%;">DRAW MODE: OFF</button>
        <input type="text" id="routeName" placeholder="රූට් එකට නමක් දෙන්න (e.g. Kandy-Colombo)" style="margin-bottom:0; flex-grow:1;">
    </div> 

    <div style="display:flex; gap:5px; margin-top:8px;">
        <button class="btn-main" id="startBtn" onclick="confirmRoute()">OK (START)</button>
        <button id="stopBtn" onclick="stopGhostDrive()" style="background:#c0392b; color:white; display:none;">STOP</button>
        <button onclick="clearRoute()" style="background:#e67e22; color:white; width: 20%;">CLR</button>
        <button onclick="reCenter()" style="background:#3498db; color:white; width: 20%;">LOC</button>
    </div>
    <div class="history-panel" id="historyList" style="font-size:10px; color:#ccc; padding:5px;">පරණ රූට්ස් ලෝඩ් වෙමින්...</div>
</div> 

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script> 

<script>
    // 🔗 ඔයාගේ මුල් Firebase Config එක එලෙසම ඇත
    const firebaseConfig = {
        apiKey: "YOUR_FIREBASE_API_KEY",
        authDomain: "cococoin-mine.firebaseapp.com",
        databaseURL: "https://cococoin-mine-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "cococoin-mine",
        storageBucket: "cococoin-mine.appspot.com",
        messagingSenderId: "717018135256",
        appId: "location-38937"
    }; 

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database(); 

    let map, realMarker, ghostMarker, polyline, driveLoop;
    let driverID = localStorage.getItem('driver_letter') || "";
    let routePoints = [], totalKm = 0, isGhosting = false, isDrawing = false;
    let stopIndices = {}, stopMarkers = []; 
    let lastRealPos = null; 

    function initMap() {
        map = L.map('map', {zoomControl: false}).setView([6.9271, 79.8612], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        polyline = L.polyline([], {color: '#2ecc71', weight: 6}).addTo(map);
        map.on('click', handleMapInteraction);
    } 

    window.onload = function() {
        if(driverID) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dispID').innerText = driverID;
            initMap();
            initGPS();
            listenToNetwork();
        }
    }; 

    function toggleDrawMode() {
        if (isGhosting) return;
        isDrawing = !isDrawing;
        const btn = document.getElementById('drawToggle');
        btn.innerText = isDrawing ? "DRAW MODE: ON" : "DRAW MODE: OFF";
        btn.classList.toggle('active-draw', isDrawing);
        if(isDrawing) {
            document.getElementById('townList').innerText = "සිතියම මත ක්ලික් කර පාර අඳින්න. නැවතුම් ලකුණු කරන්න.";
        } else {
            document.getElementById('townList').innerText = "Real Location මාදිලිය සක්‍රීයයි.";
        }
    } 

    function handleMapInteraction(e) {
        if(!isDrawing || isGhosting) return;
        
        let start = routePoints.length > 0 ? L.latLng(routePoints[routePoints.length - 1]) : (lastRealPos || e.latlng);
        
        fetch(`https://router.project-osrm.org/route/v1/driving/${start.lng},${start.lat};${e.latlng.lng},${e.latlng.lat}?overview=full&geometries=geojson`)
        .then(res => res.json()).then(data => {
            if(data.routes && data.routes.length > 0) {
                let coords = data.routes[0].geometry.coordinates;
                coords.forEach(c => {
                    routePoints.push([c[1], c[0]]);
                    polyline.addLatLng([c[1], c[0]]);
                });
                totalKm += data.routes[0].distance / 1000;
                updateStats();
                
                // නැවතුමක් ලකුණු කිරීම
                if(confirm("මෙම ස්ථානය නැවතුමක් (Stop) ලෙස ලකුණු කරනවාද?")) {
                    let lastIdx = routePoints.length - 1;
                    stopIndices[lastIdx] = true; // ESP32 එකට හඳුනාගැනීමට Index එක සටහන් කරයි
                    
                    let mk = L.marker(e.latlng, {
                        icon: L.divIcon({className: 'stop-label', html: `STOP 🛑`})
                    }).addTo(map);
                    stopMarkers.push(mk);
                }
            }
        });
    } 

    function confirmRoute() {
        if(routePoints.length < 2) return alert("කරුණාකර මුලින්ම රූට් එකක් අඳින්න හෝ ලිස්ට් එකෙන් තෝරන්න!");
        
        let rName = document.getElementById('routeName').value.trim() || "Unnamed Route";
        isGhosting = true;
        isDrawing = false;
        
        document.getElementById('drawToggle').innerText = "DRAW MODE: OFF";
        document.getElementById('drawToggle').classList.remove('active-draw');
        document.getElementById('ghostStatus').style.display = 'block';
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'inline-block';
        
        // 💾 [SAVE TO FIREBASE] - 1. පොදු ලිස්ට් එකට සහ 2. දැනට දුවන වාහනයේ ට්‍රැක් එකට
        let ptsStr = routePoints.map(p => `${p[0]},${p[1]}`).join('|');
        let stopsStr = Object.keys(stopIndices).join(',');
        
        // පොදු ලිස්ට් එකට සේව් කිරීම (ඕනෑම කෙනෙක්ට පසුව පාවිච්චි කිරීමට)
        let routeData = { name: rName, ptsStr: ptsStr, stops: stopsStr, km: totalKm.toFixed(2), timestamp: Date.now() };
        db.ref('shared_routes/global_history').push(routeData);
        
        // ESP32 එකට සහ මේ වාහනයට කෙලින්ම දත්ත යැවීම
        db.ref('shared_routes/last_route').set({ ptsStr: ptsStr, stops: stopsStr });

        // 🚗 [SMOOTH GHOST DRIVE LOOP] - කඳුකර වේගය සහ සුමට ගලායාම
        let step = 0;
        let isWaiting = false;
        let waitCounter = 0;

        driveLoop = setInterval(() => {
            if (isWaiting) {
                waitCounter++;
                document.getElementById('currentSpeedDisplay').innerText = `🛑 STOPPED`;
                updateFirebase(routePoints[Math.floor(step)][0], routePoints[Math.floor(step)][1], false, "GHOST");
                
                if (waitCounter >= 6) { // තත්පර 5-8 අතර පොඩි නැවතීමේ කාලයක් (6 * 800ms = ~5 seconds)
                    isWaiting = false;
                    waitCounter = 0;
                    step++;
                }
                return;
            }

            if(step < routePoints.length) {
                let currentPos = routePoints[Math.floor(step)];
                ghostMarker.setLatLng(currentPos);
                map.panTo(currentPos);
                
                // කඳුකර වේගය 15 ත් 35 ත් අතර Random වෙනස් කිරීම
                let randomSpeed = Math.floor(Math.random() * (35 - 15 + 1)) + 15;
                document.getElementById('currentSpeedDisplay').innerText = `${randomSpeed} km/h`;
                
                // Firebase fleet එකට දත්ත යැවීම
                updateFirebase(currentPos[0], currentPos[currentPos.length == 2 ? 1 : 0], true, "GHOST");
                
                // බස් හෝල්ට් එකක්දැයි පරීක්ෂා කිරීම
                if (stopIndices[Math.floor(step)]) {
                    isWaiting = true;
                    delete stopIndices[Math.floor(step)]; // එකම හෝල්ට් එකේ නැවත නැවත හිරවීම වැළැක්වීමට
                } else {
                    step += 0.5; // සුමටව ගලා යන පියවර (Interpolation step)
                }
            } else {
                stopGhostDrive();
                alert("නියමිත ගමන සාර්ථකව අවසන් කරන ලදී!");
            }
        }, 800);
    } 

    function stopGhostDrive() {
        clearInterval(driveLoop);
        isGhosting = false;
        document.getElementById('ghostStatus').style.display = 'none';
        document.getElementById('startBtn').style.display = 'inline-block';
        document.getElementById('stopBtn').style.display = 'none';
        document.getElementById('currentSpeedDisplay').innerText = `0 km/h`;
        document.getElementById('townList').innerText = "Real Location මාදිලිය ක්‍රියාත්මකයි.";
        
        // රූට් එක ඉවර වුණාම ආයෙත් Real GPS එක පෙන්වීමට මාරු වීම
        if(lastRealPos) {
            ghostMarker.setLatLng(lastRealPos);
            updateFirebase(lastRealPos.lat, lastRealPos.lng, false, "REAL");
        }
    } 

    function updateStats() {
        document.getElementById('km').innerText = totalKm.toFixed(2);
        let travelTime = (totalKm / 25) * 60; 
        document.getElementById('estTime').innerText = Math.round(travelTime) + "m";
    } 

    function initGPS() {
        map.locate({setView: false, watch: true, enableHighAccuracy: true});
        map.on('locationfound', (e) => {
            lastRealPos = e.latlng;
            if(!realMarker) {
                realMarker = L.circleMarker(e.latlng, {radius: 7, color: '#3498db', fillOpacity: 0.8}).addTo(map);
                ghostMarker = L.marker(e.latlng).addTo(map).bindTooltip(driverID, {permanent: true, direction: 'top'});
                map.setView(e.latlng, 15);
            }
            realMarker.setLatLng(e.latlng);
            // රූට් එකක් දුවන්නේ නැති වෙලාවට Real Location එක පෙන්වීම
            if (!isGhosting) {
                ghostMarker.setLatLng(e.latlng);
                updateFirebase(e.latlng.lat, e.latlng.lng, false, "REAL");
            }
        });
    } 

    function updateFirebase(lat, lng, moving, mode) {
        db.ref('fleet/' + driverID).set({ lat, lng, isMoving: moving, mode: mode, lastSeen: Date.now() });
    } 

    function saveUser() {
        let id = document.getElementById('uID').value.toUpperCase().trim();
        if(!id) return alert("කරුණාකර වාහන අංකයක් ඇතුළත් කරන්න!");
        localStorage.setItem('driver_letter', id);
        location.reload();
    } 

    // 🔄 [LOAD FROM FIREBASE] - පොදු ලිස්ට් එක කියවා වෙබ් එකේ පෙන්වීම සහ නැවත පාවිච්චියට ගැනීම
    function listenToNetwork() {
        db.ref('shared_routes/global_history').limitToLast(15).on('value', (snap) => {
            const listPanel = document.getElementById('historyList');
            if(!snap.exists()) {
                listPanel.innerHTML = "පරණ රූට්ස් කිසිවක් හමුනොවුණි.";
                return;
            }
            
            listPanel.innerHTML = "";
            snap.forEach(child => {
                let data = child.val();
                let item = document.createElement('div');
                item.className = "history-item";
                item.innerHTML = `<span>📍 <b>${data.name}</b> (${data.km} KM)</span> <span style="color:#27ae60;">LOAD</span>`;
                
                // පරණ පාරක් ක්ලික් කළ විට එය නැවත මැප් එකට ලෝඩ් කිරීම
                item.onclick = function() {
                    if (isGhosting) return alert("ධාවනය වන අතරතුර වෙනත් රූට්ස් ලෝඩ් කළ නොහැක!");
                    clearRouteWithoutReload();
                    
                    document.getElementById('routeName').value = data.name;
                    totalKm = parseFloat(data.km);
                    
                    // String එක ආපහු Arrays වලට හැරවීම
                    let pts = data.ptsStr.split('|');
                    pts.forEach(p => {
                        let parts = p.split(',');
                        let lat = parseFloat(parts[0]);
                        let lng = parseFloat(parts[1]);
                        routePoints.push([lat, lng]);
                        polyline.addLatLng([lat, lng]);
                    });
                    
                    // ස්ටොප් ලකුණු කිරීම
                    if (data.stops) {
                        let stops = data.stops.split(',');
                        stops.forEach(idx => {
                            stopIndices[parseInt(idx)] = true;
                            let pos = routePoints[parseInt(idx)];
                            let mk = L.marker([pos[0], pos[1]], {
                                icon: L.divIcon({className: 'stop-label', html: `STOP 🛑`})
                            }).addTo(map);
                            stopMarkers.push(mk);
                        });
                    }
                    
                    updateStats();
                    if(routePoints.length > 0) map.panTo(routePoints[0]);
                    document.getElementById('townList').innerText = "පරණ රූට් එක සාර්ථකව ලෝඩ් විය! OK (START) ඔබන්න.";
                };
                listPanel.insertBefore(item, listPanel.firstChild);
            });
        });
    } 

    function clearRouteWithoutReload() {
        routePoints = [];
        polyline.setLatLngs([]);
        totalKm = 0;
        stopIndices = {};
        stopMarkers.forEach(m => map.removeLayer(m));
        stopMarkers = [];
        updateStats();
    }

    function clearRoute() {
        if(isGhosting) return;
        clearRouteWithoutReload();
        document.getElementById('routeName').value = "";
        document.getElementById('townList').innerText = "Real Location මාදිලිය සක්‍රීයයි.";
    } 

    function reCenter() { if(lastRealPos) map.setView(lastRealPos, 15); }
</script>
</body>
</html>
