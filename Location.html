<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Driver - Network Smooth</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #121212; color: white; overflow: hidden; }
        #login-screen { position: fixed; inset: 0; background: #1a1a1a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #map { height: 45vh; width: 100%; }
        .panel { padding: 15px; background: #1f1f1f; border-radius: 25px 25px 0 0; margin-top: -25px; position: relative; z-index: 1000; box-shadow: 0 -10px 20px rgba(0,0,0,0.5); }
        input, button { width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 8px; border: none; font-size: 14px; box-sizing: border-box; }
        input { background: #333; color: white; }
        .btn-main { background: #27ae60; color: white; font-weight: bold; }
        .stats { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: bold; color: #2ecc71; font-size: 12px; }
        .history-panel { background: #111; border-radius: 8px; padding: 8px; max-height: 100px; overflow-y: auto; border: 1px solid #333; margin-top: 5px; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 6px; border-bottom: 1px solid #222; font-size: 11px; color: #3498db; }
        .del-btn { background: #c0392b; color: white; padding: 2px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; width: auto; margin: 0; }
        #townList { font-size: 10px; color: #aaa; height: 25px; overflow: hidden; font-style: italic; }
        .badge { background: #f39c12; color: black; padding: 2px 5px; border-radius: 4px; font-size: 9px; margin-right: 5px; }
    </style>
</head>
<body>

<div id="login-screen">
    <h1 style="color: #27ae60;">Ghost Driver</h1>
    <input type="text" id="uID" placeholder="Driver ID (e.g. A)">
    <button class="btn-main" onclick="saveUser()">REGISTER</button>
</div>

<div id="map"></div>
<div class="panel">
    <div class="stats">
        <span>ID: <span id="dispID" style="color:#3498db">-</span></span>
        <span>KM: <span id="km">0.00</span></span>
    </div>
    
    <div id="townList">Passing: Select points...</div>

    <input type="text" id="routeName" placeholder="රූට් එකට නමක් දෙන්න">
    <input type="number" id="targetTime" placeholder="කාලය (විනාඩි)">
    
    <div style="display:flex; gap:5px;">
        <button class="btn-main" id="okBtn" onclick="confirmRoute()">OK (START)</button>
        <button onclick="clearRoute()" style="background:#e67e22; color:white; width: 25%;">CLEAR</button>
        <button onclick="logout()" style="background:#c0392b; color:white; width: 25%;">EXIT</button>
    </div>

    <div class="history-panel">
        <div style="font-size: 10px; color: #777; margin-bottom: 5px;">NETWORK SHARED ROUTES:</div>
        <div id="historyList"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map = L.map('map', {zoomControl: false}).setView([6.9271, 79.8612], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let driverID, realMarker, ghostMarker, routePoints = [], totalKm = 0, isGhosting = false;
    let otherDrivers = {}; // අනිත් අයගේ මාකර්ස් තියාගන්න
    let polyline = L.polyline([], {color: '#f1c40f', weight: 5}).addTo(map);

    window.onload = function() {
        let saved = localStorage.getItem('driver_letter');
        if(saved) {
            driverID = saved;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dispID').innerText = driverID;
            initGPS();
            loadHistory();
            startNetworkUpdate(); // අනිත් අයව අප්ඩේට් කරන්න පටන් ගන්න
        }
    };

    function saveUser() {
        let id = document.getElementById('uID').value.toUpperCase();
        if(!id) return;
        localStorage.setItem('driver_letter', id);
        location.reload();
    }

    function logout() { localStorage.removeItem('driver_letter'); location.reload(); }

    function initGPS() {
        map.locate({setView: true, maxZoom: 15});
        map.on('locationfound', (e) => {
            if(!realMarker) {
                realMarker = L.circleMarker(e.latlng, {radius: 6, color: '#3498db'}).addTo(map);
                ghostMarker = L.marker(e.latlng).addTo(map).bindTooltip(driverID, {permanent: true});
            }
            // උඹ ඉන්න තැන නෙට්වර්ක් එකට යවන්න
            updateNetworkLocation(e.latlng);
        });
    }

    // අනිත් අයගේ ලොකේෂන් පෙන්වීම (Mocking Network)
    function updateNetworkLocation(latlng) {
        let fleet = JSON.parse(localStorage.getItem('fleet_positions') || '{}');
        fleet[driverID] = {lat: latlng.lat, lng: latlng.lng, time: Date.now()};
        localStorage.setItem('fleet_positions', JSON.stringify(fleet));
    }

    function startNetworkUpdate() {
        setInterval(() => {
            let fleet = JSON.parse(localStorage.getItem('fleet_positions') || '{}');
            for (let id in fleet) {
                if (id !== driverID) {
                    let pos = fleet[id];
                    if (!otherDrivers[id]) {
                        otherDrivers[id] = L.marker([pos.lat, pos.lng], {
                            icon: L.divIcon({className: 'other-car', html: `<b style="color:red; background:white; padding:2px; border-radius:3px;">${id}</b>`})
                        }).addTo(map);
                    } else {
                        otherDrivers[id].setLatLng([pos.lat, pos.lng]);
                    }
                }
            }
        }, 3000);
    }

    map.on('click', function(e) {
        if(isGhosting) return;
        let last = routePoints.length > 0 ? L.latLng(routePoints[routePoints.length - 1]) : (realMarker ? realMarker.getLatLng() : e.latlng);
        
        fetch(`https://router.project-osrm.org/route/v1/driving/${last.lng},${last.lat};${e.latlng.lng},${e.latlng.lat}?overview=full&geometries=geojson`)
        .then(res => res.json()).then(data => {
            if(data.routes && data.routes.length > 0) {
                data.routes[0].geometry.coordinates.forEach(c => {
                    routePoints.push([c[1], c[0]]);
                    polyline.addLatLng([c[1], c[0]]);
                });
                totalKm += data.routes[0].distance / 1000;
                document.getElementById('km').innerText = totalKm.toFixed(2);
                getPlaceName(e.latlng);
            }
        });
    });

    function getPlaceName(latlng) {
        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latlng.lat}&lon=${latlng.lng}`)
        .then(res => res.json()).then(data => {
            let place = data.address.suburb || data.address.town || "Point";
            document.getElementById('townList').innerText += " > " + place;
        });
    }

    function confirmRoute() {
        let mins = document.getElementById('targetTime').value;
        let rName = document.getElementById('routeName').value || "Route by " + driverID;
        if(routePoints.length < 2 || !mins) return alert("පාර සහ කාලය ඇතුළත් කරන්න!");

        saveRouteToNetwork(rName);
        isGhosting = true;
        
        let i = 0;
        let totalDuration = mins * 60 * 1000;
        let stepDelay = 60; 
        let pointsPerStep = routePoints.length / (totalDuration / stepDelay);

        function moveSmoothly() {
            if(i < routePoints.length) {
                let currentPoint = routePoints[Math.floor(i)];
                ghostMarker.setLatLng(currentPoint);
                map.panTo(currentPoint, {animate: true, duration: 0.1});
                
                // ESP32 Output
                console.log(`${driverID}:${currentPoint[0]},${currentPoint[1]}`);
                i += pointsPerStep;
                setTimeout(moveSmoothly, stepDelay);
            } else {
                alert("Destination Reached!");
                isGhosting = false;
            }
        }
        moveSmoothly();
    }

    // සේව් කරන රූට් එක නෙට්වර්ක් එකට (Shared Memory) දානවා
    function saveRouteToNetwork(name) {
        let history = JSON.parse(localStorage.getItem('shared_ghost_history') || '[]');
        history.unshift({id: Date.now(), driver: driverID, name: name, km: totalKm.toFixed(2), points: routePoints});
        localStorage.setItem('shared_ghost_history', JSON.stringify(history.slice(0,15)));
        loadHistory();
    }

    function loadHistory() {
        let history = JSON.parse(localStorage.getItem('shared_ghost_history') || '[]');
        document.getElementById('historyList').innerHTML = history.map(r => `
            <div class="history-item">
                <span onclick="loadSelectedRoute(${r.id})" style="cursor:pointer;">
                    <span class="badge">${r.driver}</span> ${r.name} (${r.km} KM)
                </span>
                <button class="del-btn" onclick="deleteRoute(${r.id})">Delete</button>
            </div>
        `).join('');
    }

    window.deleteRoute = function(id) {
        let history = JSON.parse(localStorage.getItem('shared_ghost_history') || '[]');
        let filtered = history.filter(r => r.id !== id);
        localStorage.setItem('shared_ghost_history', JSON.stringify(filtered));
        loadHistory();
    }

    window.loadSelectedRoute = function(id) {
        let history = JSON.parse(localStorage.getItem('shared_ghost_history') || '[]');
        let selected = history.find(r => r.id === id);
        if(selected) {
            clearRoute();
            routePoints = selected.points;
            polyline.setLatLngs(routePoints);
            totalKm = parseFloat(selected.km);
            document.getElementById('km').innerText = selected.km;
            document.getElementById('routeName').value = selected.name;
            map.fitBounds(polyline.getBounds());
        }
    }

    function clearRoute() {
        routePoints = []; polyline.setLatLngs([]); totalKm = 0;
        document.getElementById('km').innerText = "0.00";
        document.getElementById('townList').innerText = "Passing through: ";
    }
</script>
</body>
</html>
