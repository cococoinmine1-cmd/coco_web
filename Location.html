<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Fleet Pro - Realtime</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: sans-serif; background: #121212; color: white; overflow-x: hidden; }
        #map { height: 50vh; width: 100%; }
        .panel { padding: 15px; background: #1f1f1f; border-radius: 20px 20px 0 0; margin-top: -20px; position: relative; z-index: 1000; }
        .stats { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; color: #2ecc71; }
        .history-box { background: #000; padding: 10px; height: 100px; overflow-y: auto; border-radius: 8px; font-size: 12px; border: 1px solid #333; }
        .route-item { padding: 8px; border-bottom: 1px solid #222; cursor: pointer; color: #3498db; }
        button { padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #login-screen { position: fixed; inset: 0; background: #1a1a1a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; background: #333; color: white; border: none; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="login-screen">
    <h2>Ghost Fleet Login</h2>
    <input type="text" id="uName" placeholder="Driver ID (A, B, C...)">
    <button onclick="startApp()" style="background:#27ae60; color:white; width:100%;">START TRACKING</button>
</div>

<div id="map"></div>
<div class="panel">
    <div class="stats">
        <span>Driver: <span id="dispID">-</span></span>
        <span>KM: <span id="km">0.0</span></span>
    </div>
    
    <div class="history-box" id="historyList">
        <b>Saved Routes:</b><br>
    </div>

    <div style="display:flex; gap:10px;">
        <button onclick="startSim()" style="background:#3498db; color:white; flex:1;">GHOST DRIVE</button>
        <button onclick="saveCurrentRoute()" style="background:#f39c12; color:white; flex:1;">SAVE ROUTE</button>
    </div>
    <button onclick="location.reload()" style="background:#c0392b; color:white; width:100%;">RESET MAP</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map = L.map('map').setView([6.9271, 79.8612], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let realMarker, ghostMarker, driverID;
    let currentRoute = [];
    let polyline = L.polyline([], {color: '#f1c40f', weight: 4}).addTo(map);

    function startApp() {
        driverID = document.getElementById('uName').value.toUpperCase();
        if(!driverID) return alert("ID එකක් දාපන් මචං!");
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dispID').innerText = driverID;
        loadHistory();
        initGPS();
    }

    // 1. ඇත්තම ලොකේෂන් එක පෙන්වීම
    function initGPS() {
        map.locate({setView: true, watch: true, enableHighAccuracy: true});
        
        map.on('locationfound', (e) => {
            if(!realMarker) {
                // ඇත්තම ඉන්න තැනට නිල් පාට තිතක්
                realMarker = L.circleMarker(e.latlng, {radius: 8, color: '#3498db', fillOpacity: 0.8}).addTo(map);
                realMarker.bindPopup("You are here").openPopup();
                
                // Ghost Drive එකට පාවිච්චි කරන Marker එක
                ghostMarker = L.marker(e.latlng).addTo(map).bindTooltip("Vehicle " + driverID, {permanent: true});
            } else {
                realMarker.setLatLng(e.latlng);
            }
        });
        
        map.on('locationerror', () => alert("GPS Permission දීපන් මචං!"));
    }

    // 2. පාර ඇඳීම (Road Snapping)
    map.on('click', function(e) {
        let last = currentRoute.length > 0 ? currentRoute[currentRoute.length - 1] : realMarker.getLatLng();
        
        fetch(`https://router.project-osrm.org/route/v1/driving/${last.lng},${last.lat};${e.latlng.lng},${e.latlng.lat}?overview=full&geometries=geojson`)
        .then(res => res.json())
        .then(data => {
            let coords = data.routes[0].geometry.coordinates;
            coords.forEach(c => {
                let p = [c[1], c[0]];
                currentRoute.push(p);
                polyline.addLatLng(p);
            });
            let d = (data.routes[0].distance / 1000).toFixed(2);
            document.getElementById('km').innerText = (parseFloat(document.getElementById('km').innerText) + parseFloat(d)).toFixed(2);
        });
    });

    // 3. රූට් එක සේව් කිරීම
    function saveCurrentRoute() {
        if(currentRoute.length === 0) return;
        let name = "Route " + new Date().toLocaleTimeString();
        let allRoutes = JSON.parse(localStorage.getItem('fleet_history') || '[]');
        allRoutes.push({name: name, data: currentRoute});
        localStorage.setItem('fleet_history', JSON.stringify(allRoutes));
        loadHistory();
        alert("Saved!");
    }

    // 4. සේව් කරපු පාරවල් පෙන්වීම
    function loadHistory() {
        let list = document.getElementById('historyList');
        list.innerHTML = "<b>Saved Routes:</b><br>";
        let allRoutes = JSON.parse(localStorage.getItem('fleet_history') || '[]');
        allRoutes.forEach((r, index) => {
            let div = document.createElement('div');
            div.className = 'route-item';
            div.innerText = r.name;
            div.onclick = () => {
                currentRoute = r.data;
                polyline.setLatLngs(currentRoute);
                map.fitBounds(polyline.getBounds());
            };
            list.appendChild(div);
        });
    }

    function startSim() {
        if(currentRoute.length === 0) return;
        let i = 0;
        function move() {
            if(i < currentRoute.length) {
                ghostMarker.setLatLng(currentRoute[i]);
                i++;
                setTimeout(move, 500);
            }
        }
        move();
    }
</script>
</body>
</html>
