<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Driver - Fast Sync</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #121212; color: white; overflow: hidden; }
        #login-screen { position: fixed; inset: 0; background: #1a1a1a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #map { height: 45vh; width: 100%; background: #222; }
        .panel { padding: 15px; background: #1f1f1f; border-radius: 25px 25px 0 0; margin-top: -25px; position: relative; z-index: 1000; box-shadow: 0 -10px 20px rgba(0,0,0,0.5); height: 58vh; box-sizing: border-box; }
        input, button { width: 100%; padding: 12px; margin-bottom: 8px; border-radius: 8px; border: none; font-size: 14px; box-sizing: border-box; }
        input { background: #333; color: white; border: 1px solid #444; }
        .btn-main { background: #27ae60; color: white; font-weight: bold; cursor: pointer; }
        .stats { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: bold; color: #2ecc71; font-size: 12px; background: #151515; padding: 8px; border-radius: 8px; }
        .history-panel { background: #111; border-radius: 8px; padding: 8px; max-height: 100px; overflow-y: auto; border: 1px solid #333; margin-top: 5px; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #222; cursor: pointer; }
        .route-info { display: flex; flex-direction: column; font-size: 11px; }
        .badge { background: #3498db; color: white; padding: 2px 5px; border-radius: 3px; font-weight: bold; margin-right: 5px; }
        .km-label { color: #f1c40f; font-size: 10px; margin-top: 2px; }
        .del-btn { background: #c0392b; color: white; padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; width: auto; margin: 0; }
        #townList { font-size: 11px; color: #f1c40f; height: 35px; overflow-y: auto; border-left: 2px solid #27ae60; padding-left: 8px; margin-bottom: 5px; }
        .status-ghost { background: #e67e22; color: white; font-size: 11px; font-weight: bold; text-align: center; display: none; padding: 5px; border-radius: 5px; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="login-screen">
    <h1 style="color: #27ae60; margin-bottom: 10px;">Ghost Driver</h1>
    <input type="text" id="uID" placeholder="වාහන අංකය (V1, V2...)">
    <button class="btn-main" onclick="saveUser()">REGISTER & JOIN</button>
</div>

<div id="map"></div>
<div class="panel">
    <div id="ghostStatus" class="status-ghost">👻 GHOST MODE ACTIVE</div>
    <div class="stats">
        <span>ID: <span id="dispID" style="color:#3498db">-</span></span>
        <span>KM: <span id="km">0.00</span></span>
        <span style="color:#f1c40f;">⏱️ Time: <span id="duration">0m</span></span>
        <span id="currentSpeedDisplay" style="color:#e74c3c;">Speed: 0 km/h</span>
    </div>
    <div id="townList">පාර අඳින්න සිතියම මත ක්ලික් කරන්න...</div>
    <input type="text" id="routeName" placeholder="රූට් එකේ නම">
    <div style="display:flex; gap:5px;">
        <button class="btn-main" id="startBtn" onclick="confirmRoute()">OK (START)</button>
        <button onclick="reCenter()" style="background:#3498db; color:white; width: 25%; border-radius: 8px;">LOCATE</button>
        <button onclick="clearRoute()" style="background:#e67e22; color:white; width: 25%; border-radius: 8px;">CLEAR</button>
        <button onclick="logout()" style="background:#c0392b; color:white; width: 25%; border-radius: 8px;">EXIT</button>
    </div>
    <div class="history-panel"><div id="historyList">සම්බන්ධ වෙමින්...</div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDP01tcjB5AVJ4G8jUv6eY2scc7O0y27qA", 
        authDomain: "cococoin-mine.firebaseapp.com",
        databaseURL: "https://cococoin-mine-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "cococoin-mine",
        storageBucket: "cococoin-mine.appspot.com",
        messagingSenderId: "717018135256",
        appId: "location-38937"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let map, realMarker, ghostMarker, polyline;
    let driverID = localStorage.getItem('driver_letter') || "";
    let routePoints = [], totalKm = 0, isGhosting = false, townNames = [];
    let stopIndexes = []; 
    let otherMarkers = {};
    let lastRealPos = null;
    let stopMarkers = []; 

    function initMap() {
        if (map) return;
        map = L.map('map', {zoomControl: false}).setView([6.9271, 79.8612], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        polyline = L.polyline([], {color: '#f1c40f', weight: 5}).addTo(map);
        map.on('click', onMapClick);
    }

    window.onload = function() {
        if(driverID) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dispID').innerText = driverID;
            initMap();
            initGPS();
            listenToNetwork();
        }
    };

    function saveUser() {
        let id = document.getElementById('uID').value.toUpperCase().trim();
        if(!id) return;
        localStorage.setItem('driver_letter', id);
        location.reload();
    }

    function logout() { localStorage.removeItem('driver_letter'); location.reload(); }

    function initGPS() {
        map.locate({setView: false, watch: true, maxZoom: 16, enableHighAccuracy: true});
        map.on('locationfound', (e) => {
            lastRealPos = e.latlng;
            if(!realMarker) {
                realMarker = L.circleMarker(e.latlng, {radius: 8, color: '#3498db', fillOpacity: 0.5}).addTo(map);
                ghostMarker = L.marker(e.latlng).addTo(map).bindTooltip(driverID, {permanent: true});
                map.setView(e.latlng, 15);
            }
            realMarker.setLatLng(e.latlng);
            if(!isGhosting) {
                ghostMarker.setLatLng(e.latlng);
                db.ref('fleet/' + driverID).set({
                    lat: e.latlng.lat, lng: e.latlng.lng, isMoving: false, lastSeen: Date.now(), mode: "REAL"
                });
            }
        });
    }

    function reCenter() { 
        let target = isGhosting ? ghostMarker.getLatLng() : realMarker.getLatLng();
        if(target) map.setView(target, 15); 
    }

    function listenToNetwork() {
        db.ref('shared_routes').on('value', (snap) => {
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = "";
            const data = snap.val(); if(!data) return;
            Object.keys(data).reverse().forEach(key => {
                let r = data[key];
                let div = document.createElement('div');
                div.className = "history-item";
                div.onclick = () => loadRouteData(r.id);
                div.innerHTML = `<div class="route-info">
                                    <span><span class="badge">${r.driver}</span> <b>${r.name}</b></span>
                                    <span class="km-label">📏 ${r.km} KM | ⏱️ ${r.duration || '-'}</span>
                                 </div>
                                 <button class="del-btn" onclick="event.stopPropagation(); deleteRoute('${r.id}')">DEL</button>`;
                historyList.appendChild(div);
            });
        });
    }

    function onMapClick(e) {
        if(isGhosting) return;
        
        let stopMarker = L.circleMarker(e.latlng, {radius: 6, color: '#e74c3c', fillColor: '#fff', fillOpacity: 1}).addTo(map);
        stopMarkers.push(stopMarker);

        let start = routePoints.length > 0 ? L.latLng(routePoints[routePoints.length - 1]) : (lastRealPos || e.latlng);
        
        fetch(`https://router.project-osrm.org/route/v1/driving/${start.lng},${start.lat};${e.latlng.lng},${e.latlng.lat}?overview=full&geometries=geojson`)
        .then(res => res.json()).then(data => {
            if(data.routes && data.routes.length > 0) {
                // ⚡ මුල් OSRM පොයින්ට්ස් විතරක් ගන්නවා (No Interpolation here to keep it light)
                data.routes[0].geometry.coordinates.forEach(c => {
                    routePoints.push([c[1], c[0]]);
                    polyline.addLatLng([c[1], c[0]]);
                });

                totalKm += data.routes[0].distance / 1000;
                document.getElementById('km').innerText = totalKm.toFixed(2);
                
                stopIndexes.push(routePoints.length - 1);
                calculateTravelTime(totalKm, stopIndexes.length);
                updateTownNames(e.latlng);
            }
        });
    }

    function calculateTravelTime(km, numStops) {
        let avgSpeed = 18; 
        let totalMinutes = Math.round((km / avgSpeed) * 60 + (numStops * 10) / 60);
        let displayTime = totalMinutes >= 60 ? `${Math.floor(totalMinutes / 60)}h ${totalMinutes % 60}m` : `${totalMinutes}m`;
        document.getElementById('duration').innerText = displayTime;
        return displayTime;
    }

    function updateTownNames(latlng) {
        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latlng.lat}&lon=${latlng.lng}&zoom=14`)
        .then(res => res.json()).then(data => {
            let place = data.address.suburb || data.address.town || data.address.village || "Stop";
            if(!townNames.includes(place)) {
                townNames.push(place);
                document.getElementById('townList').innerHTML = "📍 " + townNames.join(" → ");
            }
        });
    }

    function confirmRoute() {
        if(routePoints.length < 2) return alert("කරුණාකර රූට් එකක් අඳින්න!");
        let rName = document.getElementById('routeName').value || "Quick Route";
        let rId = Date.now().toString();
        
        // ⚡ බෝඩ් එකට ඔරොත්තු දෙන විදිහට String එකක් විදිහට ඩේටා ටික සම්පීඩනය (Compress) කරනවා
        let compressedPoints = "";
        routePoints.forEach(p => { compressedPoints += p[0].toFixed(5) + "," + p[1].toFixed(5) + "|"; });
        if(compressedPoints.endsWith("|")) compressedPoints = compressedPoints.slice(0, -1);

        db.ref('shared_routes/' + rId).set({
            id: rId, driver: driverID, name: rName, km: totalKm.toFixed(2), duration: calculateTravelTime(totalKm, stopIndexes.length), ptsStr: compressedPoints, stops: stopIndexes.join(",")
        });

        alert("රූට් එක සාර්ථකව Firebase දැම්මා! ESP32 එක දැන් බාගනීවි.");
        clearRoute();
    }

    function clearRoute() {
        routePoints = []; polyline.setLatLngs([]); totalKm = 0; townNames = []; stopIndexes = [];
        document.getElementById('km').innerText = "0.00"; document.getElementById('duration').innerText = "0m";
        document.getElementById('townList').innerText = "පාර අඳින්න සිතියම මත ක්ලික් කරන්න...";
        stopMarkers.forEach(m => map.removeLayer(m)); stopMarkers = [];
    }
</script>
</body>
</html>
