<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Driver - Pro Network</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #121212; color: white; overflow: hidden; }
        #login-screen { position: fixed; inset: 0; background: #1a1a1a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #map { height: 48vh; width: 100%; background: #222; }
        .panel { padding: 15px; background: #1f1f1f; border-radius: 25px 25px 0 0; margin-top: -25px; position: relative; z-index: 1000; box-shadow: 0 -10px 20px rgba(0,0,0,0.5); }
        input, button { width: 100%; padding: 12px; margin-bottom: 8px; border-radius: 8px; border: none; font-size: 14px; box-sizing: border-box; }
        input { background: #333; color: white; border: 1px solid #444; }
        .btn-main { background: #27ae60; color: white; font-weight: bold; cursor: pointer; }
        .stats { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: bold; color: #2ecc71; font-size: 12px; }
        .history-panel { background: #111; border-radius: 8px; padding: 8px; max-height: 120px; overflow-y: auto; border: 1px solid #333; margin-top: 5px; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #222; font-size: 11px; color: #3498db; }
        .del-btn { background: #c0392b; color: white; padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; width: auto; margin: 0; }
        #townList { font-size: 11px; color: #f1c40f; height: 35px; overflow-y: auto; border-left: 2px solid #27ae60; padding-left: 8px; margin-bottom: 5px; }
        .badge { background: #3498db; color: white; padding: 2px 5px; border-radius: 4px; font-size: 9px; margin-right: 5px; }
    </style>
</head>
<body>

<div id="login-screen">
    <h1 style="color: #27ae60; margin-bottom: 10px;">Ghost Driver</h1>
    <p style="color: #888; font-size: 12px; margin-bottom: 15px;">Global Network Active</p>
    <input type="text" id="uID" placeholder="ඔබේ නම ඇතුළත් කරන්න">
    <button class="btn-main" onclick="saveUser()">REGISTER & JOIN</button>
</div>

<div id="map"></div>
<div class="panel">
    <div class="stats">
        <span>ID: <span id="dispID" style="color:#3498db">-</span></span>
        <span>KM: <span id="km">0.00</span></span>
        <span id="currentSpeedDisplay" style="color:#e74c3c;">Speed: 0 km/h</span>
    </div>
    
    <div id="townList">පාර අඳින්න...</div>
    <input type="text" id="routeName" placeholder="රූට් එකේ නම">
    
    <div style="display:flex; gap:5px;">
        <button class="btn-main" onclick="confirmRoute()">OK (START)</button>
        <button onclick="clearRoute()" style="background:#e67e22; color:white; width: 25%; border-radius: 8px;">CLEAR</button>
        <button onclick="logout()" style="background:#c0392b; color:white; width: 25%; border-radius: 8px;">EXIT</button>
    </div>

    <div class="history-panel">
        <div style="font-size: 10px; color: #777; margin-bottom: 5px;">සජීවී ජාලයේ රූට්ස් (Network):</div>
        <div id="historyList">සම්බන්ධ වෙමින්...</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // --- ඔබේ අලුත් Firebase Configuration එක ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY", // <--- මෙතනට ඔබේ API KEY එක දාන්න
        authDomain: "location-38937.firebaseapp.com",
        databaseURL: "https://location-38937-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "location-38937",
        storageBucket: "location-38937.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    // Firebase Initialize කිරීම
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    let map, realMarker, ghostMarker, polyline;
    let driverID = "";
    let routePoints = [], totalKm = 0, isGhosting = false, townNames = [];
    let otherDrivers = {};

    function initMap() {
        if (map) return;
        map = L.map('map', {zoomControl: false}).setView([6.9271, 79.8612], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        polyline = L.polyline([], {color: '#f1c40f', weight: 5}).addTo(map);
        map.on('click', onMapClick);
    }

    window.onload = function() {
        let saved = localStorage.getItem('driver_letter');
        if(saved) {
            driverID = saved;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dispID').innerText = driverID;
            initMap();
            initGPS();
            listenToNetwork();
        }
    };

    function saveUser() {
        let id = document.getElementById('uID').value.toUpperCase().trim();
        if(!id) return alert("කරුණාකර නමක් ඇතුළත් කරන්න!");
        localStorage.setItem('driver_letter', id);
        location.reload();
    }

    function logout() { localStorage.removeItem('driver_letter'); location.reload(); }

    function initGPS() {
        map.locate({setView: true, watch: true, maxZoom: 15});
        map.on('locationfound', (e) => {
            if(!realMarker) {
                realMarker = L.circleMarker(e.latlng, {radius: 6, color: '#3498db', fillOpacity: 0.8}).addTo(map);
                ghostMarker = L.marker(e.latlng).addTo(map).bindTooltip(driverID, {permanent: true});
            }
            // Live ලොකේෂන් සර්වර් එකට යැවීම
            db.ref('fleet/' + driverID).update({
                lat: e.latlng.lat,
                lng: e.latlng.lng,
                lastSeen: Date.now()
            });
        });
    }

    function listenToNetwork() {
        // 1. අනිත් අයගේ පිහිටීම බලාගැනීම
        db.ref('fleet').on('value', (snapshot) => {
            const data = snapshot.val();
            if(!data) return;
            Object.keys(data).forEach(id => {
                if(id !== driverID) {
                    let pos = data[id];
                    if(!otherDrivers[id]) {
                        otherDrivers[id] = L.marker([pos.lat, pos.lng], {
                            icon: L.divIcon({className: 'car', html: `<div style="background:#e74c3c; color:white; padding:2px 6px; border-radius:4px; font-size:10px; font-weight:bold; width:max-content; border:1px solid white;">${id}</div>`})
                        }).addTo(map);
                    } else {
                        otherDrivers[id].setLatLng([pos.lat, pos.lng]);
                    }
                }
            });
        });

        // 2. සේව් කරපු රූට්ස් ලිස්ට් එක ගැනීම
        db.ref('shared_routes').on('value', (snapshot) => {
            const history = [];
            snapshot.forEach((child) => {
                history.unshift(child.val());
            });
            renderHistory(history);
        }, (error) => {
            document.getElementById('historyList').innerHTML = "<div style='color:red;'>Permission Error! Check Firebase Rules.</div>";
        });
    }

    function renderHistory(history) {
        let listDiv = document.getElementById('historyList');
        if(history.length === 0) {
            listDiv.innerHTML = "<div style='color:#555; text-align:center;'>No routes shared yet</div>";
            return;
        }
        listDiv.innerHTML = history.map(r => `
            <div class="history-item" onclick="loadRouteData('${r.id}')">
                <span style="flex-grow:1;"><span class="badge">${r.driver}</span> ${r.name} (${r.km} km)</span>
                <button class="del-btn" onclick="event.stopPropagation(); deleteRoute('${r.id}')">DEL</button>
            </div>
        `).join('');
    }

    function onMapClick(e) {
        if(isGhosting) return;
        let last = routePoints.length > 0 ? L.latLng(routePoints[routePoints.length - 1]) : (realMarker ? realMarker.getLatLng() : e.latlng);
        fetch(`https://router.project-osrm.org/route/v1/driving/${last.lng},${last.lat};${e.latlng.lng},${e.latlng.lat}?overview=full&geometries=geojson`)
        .then(res => res.json()).then(data => {
            if(data.routes && data.routes.length > 0) {
                data.routes[0].geometry.coordinates.forEach(c => {
                    routePoints.push([c[1], c[0]]);
                    polyline.addLatLng([c[1], c[0]]);
                });
                totalKm += data.routes[0].distance / 1000;
                document.getElementById('km').innerText = totalKm.toFixed(2);
                updateTownNames(e.latlng);
            }
        });
    }

    function updateTownNames(latlng) {
        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latlng.lat}&lon=${latlng.lng}&zoom=14`)
        .then(res => res.json()).then(data => {
            let place = data.address.suburb || data.address.town || data.address.village || "Point";
            if(!townNames.includes(place)) {
                townNames.push(place);
                document.getElementById('townList').innerHTML = "📍 " + townNames.join(" → ");
            }
        });
    }

    // --- රූට් එක පටන් ගැනීම සහ වේගය පාලනය ---
    function confirmRoute() {
        if(routePoints.length < 2) return alert("කරුණාකර පාරක් අඳින්න!");
        let rName = document.getElementById('routeName').value || "New Route";
        let rId = Date.now().toString();
        
        db.ref('shared_routes/' + rId).set({
            id: rId, driver: driverID, name: rName, km: totalKm.toFixed(2), points: routePoints, towns: townNames
        });

        isGhosting = true;
        let i = 0;
        function move() {
            if(i < routePoints.length) {
                // වේගය තවත් අඩු කර ඇත:
                // මුල් 10% දුර 5km/h, ඉතිරි දුර 15km/h
                let speed = (i < routePoints.length * 0.1) ? 5 : 15;
                document.getElementById('currentSpeedDisplay').innerText = `Speed: ${speed} km/h`;
                
                let currentPoint = routePoints[Math.floor(i)];
                ghostMarker.setLatLng(currentPoint);
                map.panTo(currentPoint, {animate: true, duration: 0.2});
                
                // ඊළඟ පොයින්ට් එකට යන ප්‍රමාණය (Step size)
                i += (speed === 5) ? 0.1 : 0.3; 
                setTimeout(move, 200); // 0.2s ක ප්‍රමදයක් (Smoothness වැඩි කිරීමට)
            } else {
                isGhosting = false;
                document.getElementById('currentSpeedDisplay').innerText = `Speed: 0 km/h`;
                alert("ගමනාන්තයට පැමිණියා!");
            }
        }
        move();
    }

    window.loadRouteData = function(id) {
        db.ref('shared_routes/' + id).once('value', (snap) => {
            let selected = snap.val();
            if(!selected) return;
            clearRoute();
            routePoints = selected.points;
            polyline.setLatLngs(routePoints);
            totalKm = parseFloat(selected.km);
            document.getElementById('km').innerText = selected.km;
            townNames = selected.towns || [];
            document.getElementById('townList').innerHTML = "📍 " + townNames.join(" → ");
            map.fitBounds(polyline.getBounds());
        });
    }

    window.deleteRoute = function(id) {
        if(confirm("මෙම රූට් එක මකා දැමීමට අවශ්‍යද?")) {
            db.ref('shared_routes/' + id).remove();
        }
    }

    function clearRoute() {
        routePoints = []; 
        if(polyline) polyline.setLatLngs([]); 
        totalKm = 0; 
        townNames = [];
        document.getElementById('km').innerText = "0.00";
        document.getElementById('townList').innerText = "පාර අඳින්න...";
    }
</script>
</body>
</html>
