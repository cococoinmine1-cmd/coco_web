<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Driver - Control Panel</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #121212; color: white; overflow: hidden; }
        #login-screen { position: fixed; inset: 0; background: #1a1a1a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        #map { height: 65vh; width: 100%; }
        .panel { padding: 20px; background: #1f1f1f; border-radius: 25px 25px 0 0; margin-top: -25px; position: relative; z-index: 1000; box-shadow: 0 -10px 20px rgba(0,0,0,0.5); }
        input, button { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 10px; border: none; font-size: 16px; box-sizing: border-box; }
        input { background: #333; color: white; }
        .btn-main { background: #27ae60; color: white; font-weight: bold; }
        .stats { display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: bold; color: #2ecc71; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .speed-info { font-size: 13px; color: #aaa; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="login-screen">
    <h1 style="color: #27ae60;">Ghost Driver</h1>
    <p>Register your unique Driver ID</p>
    <input type="text" id="uID" placeholder="Enter Driver Letter (e.g. A, B, C)">
    <button class="btn-main" onclick="saveUser()">REGISTER</button>
</div>

<div id="map"></div>

<div class="panel">
    <div class="stats">
        <span>Driver: <span id="dispID" style="color:#3498db">-</span></span>
        <span>Distance: <span id="km">0.00</span> KM</span>
    </div>

    <div class="speed-info" id="speedStatus">Set route and enter time to calculate speed</div>

    <input type="number" id="targetTime" placeholder="Target Time (Minutes)">
    
    <div style="display:flex; gap:10px;">
        <button class="btn-main" id="okBtn" onclick="confirmRoute()">OK (Start Fake GPS)</button>
        <button onclick="resetMap()" style="background:#c0392b; color:white; width: 30%;">RESET</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map = L.map('map', {zoomControl: false}).setView([6.9271, 79.8612], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let driverID, realMarker, ghostMarker;
    let routePoints = [];
    let polyline = L.polyline([], {color: '#f1c40f', weight: 5}).addTo(map);
    let totalKm = 0;
    let isGhosting = false;

    // Check if user already registered
    window.onload = function() {
        let saved = localStorage.getItem('driver_letter');
        if(saved) {
            driverID = saved;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dispID').innerText = driverID;
            initGPS();
        }
    };

    function saveUser() {
        let id = document.getElementById('uID').value.toUpperCase();
        if(!id) return alert("Enter an ID!");
        localStorage.setItem('driver_letter', id);
        location.reload();
    }

    function initGPS() {
        map.locate({setView: true, watch: true, enableHighAccuracy: true});
        map.on('locationfound', (e) => {
            if(!realMarker) {
                // Real Position Blue Dot
                realMarker = L.circleMarker(e.latlng, {radius: 8, color: '#3498db', fillOpacity: 0.8}).addTo(map);
                // Ghost Vehicle Marker (with ID)
                ghostMarker = L.marker(e.latlng).addTo(map).bindTooltip(driverID, {permanent: true, direction: 'top'});
            } else if(!isGhosting) {
                realMarker.setLatLng(e.latlng);
                ghostMarker.setLatLng(e.latlng);
            }
        });
    }

    // Drawing route with snapping
    map.on('click', function(e) {
        if(isGhosting) return;
        let last = routePoints.length > 0 ? routePoints[routePoints.length - 1] : realMarker.getLatLng();
        
        fetch(`https://router.project-osrm.org/route/v1/driving/${last.lng},${last.lat};${e.latlng.lng},${e.latlng.lat}?overview=full&geometries=geojson`)
        .then(res => res.json())
        .then(data => {
            let coords = data.routes[0].geometry.coordinates;
            coords.forEach(c => {
                let p = [c[1], c[0]];
                routePoints.push(p);
                polyline.addLatLng(p);
            });
            totalKm += data.routes[0].distance / 1000;
            document.getElementById('km').innerText = totalKm.toFixed(2);
        });
    });

    function confirmRoute() {
        let mins = document.getElementById('targetTime').value;
        if(routePoints.length < 2 || !mins) return alert("පාර ඇඳලා විනාඩි ගණන ඇතුළත් කරන්න!");

        isGhosting = true;
        document.getElementById('okBtn').innerText = "DRIVING...";
        document.getElementById('okBtn').style.background = "#f39c12";

        // Calculate Speed (Time per point)
        let totalPoints = routePoints.length;
        let intervalTime = (mins * 60 * 1000) / totalPoints; 
        let calculatedSpeed = (totalKm / (mins / 60)).toFixed(1);
        document.getElementById('speedStatus').innerText = "Auto-calculated Speed: " + calculatedSpeed + " km/h";

        let i = 0;
        function move() {
            if(i < routePoints.length) {
                ghostMarker.setLatLng(routePoints[i]);
                map.panTo(routePoints[i]);

                // ESP32 එකට දත්ත යවන කොටස (DriverID:Lat,Lng)
                console.log(`${driverID}:${routePoints[i][0]},${routePoints[i][1]}`);
                
                i++;
                setTimeout(move, intervalTime);
            } else {
                alert("Destination Reached!");
                resetMap();
            }
        }
        move();
    }

    function resetMap() { location.reload(); }
</script>
</body>
</html>
