<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Driver Control</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #121212; color: white; }
        #map { height: 75vh; width: 100%; }
        .ui-panel { padding: 15px; text-align: center; background: #1f1f1f; border-top: 2px solid #27ae60; }
        button { padding: 12px 25px; margin: 5px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .start-btn { background: #27ae60; color: white; }
        .clear-btn { background: #c0392b; color: white; }
        .speed-box { margin-top: 10px; font-size: 14px; color: #aaa; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui-panel">
    <button class="start-btn" onclick="startNav()">START SIMULATION</button>
    <button class="clear-btn" onclick="resetMap()">CLEAR PATH</button>
    <div class="speed-box">
        Speed: <input type="range" id="speed" min="10" max="100" value="40"> 
        <span id="speedDisplay">40</span> km/h
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // මැප් එක සෙට් කිරීම (ලංකාවට)
    var map = L.map('map').setView([6.9271, 79.8612], 13);

    // මැප් එකේ ලේයර් එක (OpenStreetMap)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    var routePoints = [];
    var routeLine = L.polyline([], {color: '#2ecc71', weight: 5}).addTo(map);

    // අතුරු පාරවල් දිගේ ක්ලික් කරලා පාර ඇඳීම
    map.on('click', function(e) {
        var lat = e.latlng.lat;
        var lon = e.latlng.lng;
        routePoints.push([lat, lon]);
        routeLine.addLatLng([lat, lon]);
        L.circleMarker([lat, lon], {radius: 5, color: '#f1c40f', fillOpacity: 1}).addTo(map);
    });

    function startNav() {
        if(routePoints.length < 2) {
            alert("කරුණාකර පාරක් අඳින්න!");
            return;
        }
        console.log("Route Data for ESP32:", JSON.stringify(routePoints));
        alert("පාර සාර්ථකයි! දැන් ESP32 එක හරහා දත්ත යැවීමට සූදානම්.");
    }

    function resetMap() {
        location.reload();
    }

    document.getElementById('speed').oninput = function() {
        document.getElementById('speedDisplay').innerText = this.value;
    };
</script>

</body>
</html>
